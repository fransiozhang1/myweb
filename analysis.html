<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化平台 - 分析端</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="analysis.css" />
</head>
<body>

<div id="hud-left">
    <div id="header">
        <h1>大徐家汇数智化平台</h1>
        <p>● 深度分析模式</p>
    </div>
    <button id="btn-deep-filter" class="big-action-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 19l-7-7 7-7"/><path d="M8.5 12h13"/></svg>
        AI 深度关联分析
    </button>
</div>

<div id="deep-filter-win" class="floating-window">
    <div class="win-header"><span>AI 语义提取与数据关联</span><span class="close-win">×</span></div>
    <div style="padding:25px; display:flex; flex-direction:column; gap:15px;">
        <div style="border:2px dashed #e2e8f0; padding:20px; border-radius:16px; text-align:center; background:#fafafa;">
            <input type="file" id="deep-file-in" style="display:none;" accept=".csv,.txt">
            <label for="deep-file-in" style="cursor:pointer; color:var(--primary); font-weight:800;">点击上传 CSV 数据文件</label>
            <div id="file-name" style="font-size:11px; color:#94a3b8; margin-top:10px;">上传后将自动解析表头</div>
        </div>

        <div id="csv-fields-ui" style="display:none;">
            <div class="group-label">关联显示字段 (勾选后同步至地图)</div>
            <div id="csv-col-container"></div>
        </div>

        <button id="btn-run-deep" style="background:var(--primary); color:white; border:none; padding:14px; border-radius:12px; font-weight:800; cursor:pointer;">开始提取并分析</button>
        <button id="btn-restore-deep" style="background:#f1f5f9; color:#64748b; border:none; padding:12px; border-radius:12px; display:none; cursor:pointer;">取消并还原原始图层</button>
        <div id="deep-log" style="font-size:11px; color:var(--primary); text-align:center; font-weight:600;"></div>
    </div>
</div>

<div id="analysis-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-layer-t" title="控制面板"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
</div>

<div id="editor-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-ruler" title="测距"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20L5 6M9 6l3 3M12 9l3 3M15 12l3 3"/></svg></div>
    <div class="tool-btn" id="btn-poly" title="绘面"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/></svg></div>
    <div class="tool-btn" id="btn-marker" title="标注点"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
    <div class="tool-btn danger" id="btn-eraser" title="橡皮擦"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17l-10-10"/></svg></div>
</div>

<div id="layer-menu" class="floating-window">
    <div class="win-header"><span>分析控制面板</span><span class="close-win" onclick="deactivateAll()">×</span></div>
    <div style="padding:20px; overflow-y:auto; flex:1;">
        <div class="group-label">当前分析数据类</div>
        <div id="active-category-list"></div>
        </div>
</div>

<div id="naming-ui">
    <h3 style="margin-top:0; font-size:18px;">标记点命名</h3>
    <input type="text" id="m-name" placeholder="名称...">
    <button id="m-save">确认保存</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<script>
    const API_KEY = "sk-953b1a97918949d2a18c9a07a14729d0";

    // 1. 初始化
    var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);
    map.pm.setLang('zh');
    map.pm.addControls({ drawControls: false, editControls: false });

    const state = JSON.parse(localStorage.getItem('analysis_state')) || { keywords: [], activeLayers: [] };
    let currentKeywords = [...state.keywords];
    let originalStateKeywords = [...state.keywords];
    const pool = {}, displayLayers = {};
    const keywordVisibility = {};
    currentKeywords.forEach(kw => keywordVisibility[kw] = true);

    // --- CSV 数据关联状态 ---
    let csvDataMap = {}; // 结构: { "清洗后名称": { fullRowData } }
    let activeCsvFields = new Set(); 

    // 辅助：清洗名称以实现高成功率匹配
    const normalize = (str) => (str || "").replace(/\(.*\)|（.*）/g, "").replace(/社区|商铺|分店|酒店|超市/g, "").trim().toLowerCase();

    // 2. 交互逻辑：排他性与 ESC
    function deactivateAll() {
        document.querySelectorAll('.floating-window').forEach(w => w.style.display = 'none');
        document.querySelectorAll('.tool-btn, .big-action-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('naming-ui').style.display = 'none';
        map.pm.disableDraw();
    }
    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') deactivateAll(); });

    const setupBtn = (id, action) => {
        document.getElementById(id).onclick = () => {
            const was = document.getElementById(id).classList.contains('active');
            deactivateAll();
            if(!was) { action(); document.getElementById(id).classList.add('active'); }
        };
    };

    setupBtn('btn-layer-t', () => document.getElementById('layer-menu').style.display = 'flex');
    setupBtn('btn-deep-filter', () => document.getElementById('deep-filter-win').style.display = 'flex');
    setupBtn('btn-ruler', () => map.pm.enableDraw('Line', { measurements: { showLength: true } }));
    setupBtn('btn-poly', () => map.pm.enableDraw('Polygon', { measurements: { showArea: true } }));
    setupBtn('btn-marker', () => map.pm.enableDraw('Marker'));
    setupBtn('btn-eraser', () => map.pm.toggleGlobalRemovalMode());

    document.querySelectorAll('.close-win').forEach(c => c.onclick = deactivateAll);

    // 3. 核心渲染函数：集成 CSV 动态数据
    // --- 简化后的渲染逻辑 ---

// 1. 过滤逻辑：只检查名称是否包含在 currentKeywords 中即可
function refreshMap() {
    for(let name in displayLayers) {
        const conf = displayLayers[name].conf;
        map.removeLayer(displayLayers[name].layer);
        
        if(conf.visible) {
            displayLayers[name].layer = L.geoJSON(pool[name], {
                filter: (f) => {
                    // 如果没有关键词，显示全部；如果有，则匹配关键词
                    if(currentKeywords.length === 0) return true;
                    return currentKeywords.some(kw => (f.properties.name || "").includes(kw));
                },
                pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 7, weight: 2.0, fillColor: conf.c, color: "#fff", fillOpacity: 0.9 }),
                onEachFeature: (f, l) => { 
                    const p = f.properties;
                    let h = `<div class="popup-header ${name.includes('房产')?'house':''}"><h3>${p.name}</h3></div><div style="padding:15px; font-size:12px;">`;
                    h += `<div><b>原始地址:</b> ${p.address || '-'}</div>`;
                    
                    // 深度关联 CSV 逻辑保持不变
                    const matchKey = normalize(p.name);
                    if(csvDataMap[matchKey]) {
                        activeCsvFields.forEach(field => {
                            if(csvDataMap[matchKey][field]) {
                                h += `<div style="margin-top:8px; color:var(--primary); border-top:1px dashed #eee; padding-top:5px;"><b>${field}:</b> ${csvDataMap[matchKey][field]}</div>`;
                            }
                        });
                    }
                    l.bindPopup(h + `</div>`, { maxWidth: 280 });
                }
            }).addTo(map);
        }
    }
}



    // 4. CSV 本地预处理逻辑
    document.getElementById('deep-file-in').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('file-name').innerText = file.name;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            const lines = event.target.result.split('\n').filter(l => l.trim());
            if(lines.length < 2) return;
            const headers = lines[0].split(',').map(h => h.trim());
            
            // 自动侦测名称列
            const nameIdx = headers.findIndex(h => /名称|店名|商铺|项目|Name/i.test(h)) || 0;
            
            // 构建映射表
            csvDataMap = {};
            lines.slice(1).forEach(line => {
                const vals = line.split(',').map(v => v.trim());
                const row = {};
                headers.forEach((h, i) => row[h] = vals[i]);
                const key = normalize(row[headers[nameIdx]]);
                if(key) csvDataMap[key] = row;
            });

            // 生成 UI
            const container = document.getElementById('csv-col-container');
            container.innerHTML = '';
            document.getElementById('csv-fields-ui').style.display = 'block';
            headers.forEach(h => {
                const div = document.createElement('div'); div.className = 'layer-item';
                div.style = "padding:5px 10px; font-size:12px;";
                div.innerHTML = `<input type="checkbox"><span>${h}</span>`;
                div.querySelector('input').onchange = (ev) => {
                    if(ev.target.checked) activeCsvFields.add(h); else activeCsvFields.delete(h);
                    refreshMap();
                };
                container.appendChild(div);
            });
        };
        reader.readAsText(file);
    };

    // 5. AI 提取逻辑
    document.getElementById('btn-run-deep').onclick = async () => {
        const file = document.getElementById('deep-file-in').files[0];
        if(!file) return alert("请上传文件");
        const log = document.getElementById('deep-log'); log.innerText = "⏳ AI 正在执行语义提取...";
        try {
            const fd = new FormData(); fd.append('file', file); fd.append('purpose', 'file-extract');
            const up = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/files", { method:"POST", headers:{"Authorization":`Bearer ${API_KEY}`}, body:fd });
            const fid = (await up.json()).id;
            const ai = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                method:"POST", headers:{"Content-Type":"application/json", "Authorization":`Bearer ${API_KEY}`},
                body: JSON.stringify({ model:"qwen-long", messages:[{role:"system", content:`fileid://${fid}`}, {role:"user", content:"提取文件中提到的所有地点名称，用逗号分隔，仅返回名称。"}]})
            });
            const names = (await ai.json()).choices[0].message.content.split(/[，,]/).map(n => n.trim()).filter(n => n);
            currentKeywords = names;
            initToggles(); refreshMap();
            log.innerText = `✅ 成功提取 ${names.length} 个关联点`;
            document.getElementById('btn-restore-deep').style.display = 'block';
        } catch(e) { log.innerText = "❌ 提取失败"; }
    };

    // 6. 其他基础逻辑 (图层加载、窗口拖拽等)
    function initToggles() {
        document.getElementById('active-keyword-list').innerHTML = currentKeywords.map(kw => {
            if (!(kw in keywordVisibility)) keywordVisibility[kw] = true;
            return `<div class="layer-item"><input type="checkbox" ${keywordVisibility[kw]?'checked':''} onchange="toggleKw('${kw}', this.checked)"><span>${kw}</span></div>`;
        }).join('');
    }
    window.toggleKw = (kw, show) => { keywordVisibility[kw] = show; refreshMap(); };

// 2. 数据加载逻辑 (删除了 initToggles 调用)
state.activeLayers.forEach(name => {
    const isH = name.includes('房产');
    const color = isH ? '#FF7E5F' : `hsl(${(state.activeLayers.indexOf(name)*137)%360},65%,50%)`;
    fetch(isH ? 'houses.json' : `data_poi/${name}.json`).then(r => r.json()).then(data => {
        pool[name] = data;
        displayLayers[name] = { layer: L.layerGroup(), conf: { c: color, visible: true } };
        
        const div = document.createElement('div'); 
        div.className = 'layer-item';
        div.innerHTML = `<input type="checkbox" checked><div class="legend-dot" style="background:${color}"></div><span>${name}</span>`;
        div.querySelector('input').onchange = (e) => { 
            displayLayers[name].conf.visible = e.target.checked; 
            refreshMap(); 
        };
        document.getElementById('active-category-list').appendChild(div);
        refreshMap();
    });
});

    document.getElementById('btn-restore-deep').onclick = () => { currentKeywords = [...originalStateKeywords]; initToggles(); refreshMap(); deactivateAll(); };
    let curM = null;
    map.on('pm:create', (e) => { if(e.shape === 'Marker') { curM = e.layer; document.getElementById('naming-ui').style.display='block'; } });
    document.getElementById('m-save').onclick = () => { curM.bindPopup(`<b>${document.getElementById('m-name').value}</b>`).openPopup(); deactivateAll(); };

    document.querySelectorAll('.win-header').forEach(h => {
        let d=false, o=[0,0], w=h.parentElement;
        h.onmousedown=(e)=>{ d=true; o=[w.offsetLeft-e.clientX, w.offsetTop-e.clientY]; };
        document.onmousemove=(e)=>{ if(!d) return; w.style.left=(e.clientX+o[0])+'px'; w.style.top=(e.clientY+o[1])+'px'; w.style.bottom='auto'; w.style.right='auto'; };
        document.onmouseup=()=>d=false;
    });
    fetch('xuhui.json').then(r => r.json()).then(data => L.geoJSON(data, { style: { color: "#2BB5BE", weight: 1.5, fillOpacity: 0.05 }}).addTo(map));
</script>
</body>
</html>
