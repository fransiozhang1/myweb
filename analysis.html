<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化平台 - 深度分析端</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="analysis.css" />
</head>
<body>

<div id="hud-left">
    <div id="header">
        <h1>大徐家汇数智化平台</h1>
        <p>● 专业多轨数据分析</p>
    </div>
    <button id="btn-deep-filter" class="big-action-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15.5 19l-7-7 7-7"/><path d="M8.5 12h13"/></svg>
        AI 独立深度筛选
    </button>
</div>

<div id="deep-filter-win" class="floating-window">
    <div class="win-header"><span>独立轨道筛选与关联</span><span class="close-win">×</span></div>
    <div style="padding:24px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:15px;">
        
        <div id="filter-config-zone">
            <div class="group-label">1. 选择筛选范围</div>
            <div id="deep-layer-targets" style="background:#f8fafc; padding:12px; border-radius:16px; border:1px solid #eef2f7; max-height: 120px; overflow-y: auto;"></div>

            <div class="group-label">2. 上传参考数据 (CSV)</div>
            <div style="border:2px dashed #cbd5e1; padding:20px; border-radius:18px; text-align:center; background:#fff; transition: 0.3s;" id="upload-box">
                <input type="file" id="deep-file-in" style="display:none;" accept=".csv,.txt">
                <label for="deep-file-in" style="cursor:pointer; color:var(--primary); font-weight:800; font-size:14px;">点击或拖拽 CSV 文件</label>
                <div id="file-name" style="font-size:11px; color:#94a3b8; margin-top:6px;">支持全品类数据匹配关联</div>
            </div>

            <button id="btn-run-deep" style="background:var(--primary); color:white; border:none; padding:16px; border-radius:16px; font-weight:800; cursor:pointer; width:100%; margin-top:15px; font-size:15px;">执行 AI 智能提取</button>
        </div>

        <hr style="border:0; border-top:1px solid #f1f5f9; margin:10px 0;">

        <div class="group-label">当前生效的独立分析轨道</div>
        <div id="filter-history-container">
            <div style="padding:30px; text-align:center; color:#cbd5e1; font-size:13px; font-weight:600;">暂无活动分析轨道</div>
        </div>
        
        <div id="deep-log" style="font-size:11px; color:var(--primary); text-align:center; font-weight:700;"></div>
    </div>
</div>

<div id="analysis-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-layer-t" title="大类图层控制"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
</div>

<div id="editor-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-ruler" title="测距"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20L5 6M9 6l3 3M12 9l3 3M15 12l3 3"/></svg></div>
    <div class="tool-btn" id="btn-poly" title="绘面/面积"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/></svg></div>
    <div class="tool-btn" id="btn-marker" title="点标注"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
    <div class="tool-btn danger" id="tool-eraser" title="橡皮擦"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17l-10-10"/></svg></div>
</div>

<div id="layer-menu" class="floating-window">
    <div class="win-header"><span>数据大类控制</span><span class="close-win">×</span></div>
    <div style="padding:20px; overflow-y:auto; flex:1;" id="active-category-list"></div>
</div>

<div id="naming-ui">
    <h3 style="margin-top:0; font-size:18px;">标记点命名</h3>
    <input type="text" id="m-name" placeholder="名称...">
    <button id="m-save">保存至地图</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<script>
    const API_KEY = "sk-953b1a97918949d2a18c9a07a14729d0";

    // 1. 地图初始化
    var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);
    map.pm.setLang('zh');
    map.pm.addControls({ drawControls: false, editControls: false });

    // 2. 数据与轨道管理
    const state = JSON.parse(localStorage.getItem('analysis_state')) || { keywords: [], activeLayers: [] };
    const pool = {}, displayLayers = {};
    
    // 每一个图层的深度筛选数据：{ "餐饮服务": { kws: [], fields: Set(), headers: [] } }
    let deepFilterRegistry = {};
    let csvGlobalMap = {}; // 存储清洗后的名称映射

    state.activeLayers.forEach(name => {
        deepFilterRegistry[name] = {
            kws: [...state.keywords], // 初始继承
            activeFields: new Set(),
            availableHeaders: [],
            isDeep: false // 标记是否处于 AI 筛选模式
        };
    });

    const normalize = (n) => (n||"").toString().replace(/\(.*\)|（.*）/g, "").replace(/公司|店|分店|超市|社区|驿站/g, "").trim().toLowerCase();

    // 3. 交互逻辑
    function deactivateAll() {
        document.querySelectorAll('.floating-window').forEach(w => w.style.display = 'none');
        document.querySelectorAll('.tool-btn, .big-action-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('naming-ui').style.display = 'none';
        map.pm.disableDraw();
    }
    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') deactivateAll(); });

    const setupBtn = (id, action) => {
        document.getElementById(id).onclick = () => {
            const was = document.getElementById(id).classList.contains('active');
            deactivateAll();
            if(!was) { action(); document.getElementById(id).classList.add('active'); }
        };
    };

    setupBtn('btn-layer-t', () => document.getElementById('layer-menu').style.display = 'flex');
    setupBtn('btn-deep-filter', () => { 
        renderDeepFilterUI(); 
        document.getElementById('deep-filter-win').style.display = 'flex'; 
    });
    setupBtn('btn-ruler', () => map.pm.enableDraw('Line', { measurements: { displayUnit: 'metric', showLength: true } }));
    setupBtn('btn-poly', () => map.pm.enableDraw('Polygon', { measurements: { displayUnit: 'metric', showArea: true } }));
    setupBtn('btn-marker', () => map.pm.enableDraw('Marker'));
    document.getElementById('tool-eraser').onclick = () => map.pm.toggleGlobalRemovalMode();
    document.querySelectorAll('.close-win').forEach(c => c.onclick = deactivateAll);

    // 4. 通用渲染逻辑 (核心：支持独立卡片字段开关)
    function refreshMap() {
        for(let name in displayLayers) {
            const conf = displayLayers[name].conf;
            const reg = deepFilterRegistry[name];
            map.removeLayer(displayLayers[name].layer);
            
            if(conf.visible) {
                displayLayers[name].layer = L.geoJSON(pool[name], {
                    filter: (f) => {
                        if(reg.kws.length === 0) return true;
                        return reg.kws.some(kw => (f.properties.name || "").includes(kw));
                    },
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 7, weight: 2.0, fillColor: conf.c, color: "#fff", fillOpacity: 0.9 }),
                    onEachFeature: (f, l) => {
                        const p = f.properties;
                        let h = `<div class="popup-header ${name.includes('房产')?'house':''}"><h3>${p.name}</h3></div><div style="padding:15px; font-size:12px;">`;
                        h += `<div><b>原始地址:</b> ${p.address || '-'}</div>`;
                        
                        // 独立卡片关联逻辑
                        const mKey = normalize(p.name);
                        if(csvGlobalMap[mKey]) {
                            const data = csvGlobalMap[mKey];
                            reg.activeFields.forEach(field => {
                                if(data[field]) h += `<div style="margin-top:8px; color:var(--primary); border-top:1px dashed #eee; padding-top:5px;"><b>${field}:</b> ${data[field]}</div>`;
                            });
                        }
                        l.bindPopup(h + `</div>`, { maxWidth: 280 });
                    }
                }).addTo(map);
            }
        }
    }

    // 5. 初始化加载
    state.activeLayers.forEach(name => {
        const isH = name.includes('房产');
        const color = isH ? '#FF7E5F' : `hsl(${(state.activeLayers.indexOf(name)*137)%360},65%,50%)`;
        fetch(isH ? 'houses.json' : `data_poi/${name}.json`).then(r => r.json()).then(data => {
            pool[name] = data;
            displayLayers[name] = { layer: L.layerGroup(), conf: { c: color, visible: true } };
            const div = document.createElement('div'); div.className = 'layer-item';
            div.innerHTML = `<input type="checkbox" checked><div class="legend-dot" style="background:${color}"></div><span>${name}</span>`;
            div.querySelector('input').onchange = (e) => { displayLayers[name].conf.visible = e.target.checked; refreshMap(); };
            document.getElementById('active-category-list').appendChild(div);
            refreshMap();
        });
    });

    // 6. 深度分析 UI 与 逻辑
    let tempCsvHeaders = [];
    let tempCsvData = [];

    function renderDeepFilterUI() {
        // 渲染图层选择器
        document.getElementById('deep-layer-targets').innerHTML = state.activeLayers.map(n => 
            `<div class="layer-item" style="padding:6px 10px; margin-bottom:5px; border-radius:10px;"><input type="checkbox" class="target-cb" value="${n}" checked><span>${n}</span></div>`
        ).join('');
        renderHistoryCards();
    }

    // 处理文件解析
    document.getElementById('deep-file-in').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('file-name').innerText = file.name;
        const reader = new FileReader();
        reader.onload = (event) => {
            const lines = event.target.result.split('\n').filter(l => l.trim());
            tempCsvHeaders = lines[0].split(',').map(h => h.trim());
            const nameIdx = tempCsvHeaders.findIndex(h => /名称|店名|Name/i.test(h)) || 0;
            tempCsvData = lines.slice(1).map(line => {
                const vals = line.split(',').map(v => v.trim());
                const obj = {}; tempCsvHeaders.forEach((h, i) => obj[h] = vals[i]);
                const key = normalize(obj[tempCsvHeaders[nameIdx]]);
                if(key) csvGlobalMap[key] = {...(csvGlobalMap[key] || {}), ...obj};
                return obj;
            });
        };
        reader.readAsText(file);
    };

    // 执行 AI 筛选分析
    document.getElementById('btn-run-deep').onclick = async () => {
        const selected = Array.from(document.querySelectorAll('.target-cb:checked')).map(cb => cb.value);
        if(selected.length === 0) return alert("请勾选目标图层");
        const file = document.getElementById('deep-file-in').files[0];
        if(!file) return alert("请上传 CSV 数据文件");
        
        const log = document.getElementById('deep-log'); log.innerText = "⏳ AI 正在执行分轨关联...";
        
        try {
            const fd = new FormData(); fd.append('file', file); fd.append('purpose', 'file-extract');
            const upRes = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/files", { method:"POST", headers:{"Authorization":`Bearer ${API_KEY}`}, body:fd });
            const fid = (await upRes.json()).id;
            const aiRes = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                method:"POST", headers:{"Content-Type":"application/json", "Authorization":`Bearer ${API_KEY}`},
                body: JSON.stringify({ model:"qwen-long", messages:[{role:"system", content:`fileid://${fid}`}, {role:"user", content:"仅返回文件中提到的所有具体地点、项目或店名，用逗号分隔，不要多言。"}]})
            });
            const names = (await aiRes.json()).choices[0].message.content.split(/[，,]/).map(n => n.trim()).filter(n => n);
            
            // 为每个选中的轨道更新状态
            selected.forEach(ln => {
                deepFilterRegistry[ln].kws = names;
                deepFilterRegistry[ln].isDeep = true;
                deepFilterRegistry[ln].availableHeaders = [...tempCsvHeaders];
            });

            // --- 关键：重置输入区 ---
            document.getElementById('deep-file-in').value = "";
            document.getElementById('file-name').innerText = "等待下一次筛选...";
            document.querySelectorAll('.target-cb').forEach(cb => cb.checked = false);
            tempCsvHeaders = []; tempCsvData = [];

            refreshMap();
            renderHistoryCards();
            log.innerText = `✅ 成功建立 ${selected.length} 条关联轨道`;
        } catch(e) { log.innerText = "❌ 分析失败。"; }
    };

    // 渲染历史卡片 (带独立字段开关)
    function renderHistoryCards() {
        const container = document.getElementById('filter-history-container');
        container.innerHTML = '';
        let hasDeep = false;

        for(let ln in deepFilterRegistry) {
            const reg = deepFilterRegistry[ln];
            if(!reg.isDeep) continue;
            hasDeep = true;

            const card = document.createElement('div'); card.className = 'history-card';
            let html = `
                <div class="history-head">
                    <div>
                        <div class="history-title">${ln}</div>
                        <div class="history-meta">AI 筛选: ${reg.kws.length} 类目标点位</div>
                    </div>
                </div>
                <div class="group-label" style="font-size:9px;">显示关联字段</div>
                <div class="history-fields">`;
            
            reg.availableHeaders.forEach(h => {
                html += `
                    <label class="field-tag">
                        <input type="checkbox" ${reg.activeFields.has(h)?'checked':''} onchange="toggleField('${ln}', '${h}', this.checked)">
                        ${h}
                    </label>`;
            });
            
            html += `</div><button class="btn-undo-action" onclick="undoDeep('${ln}')">撤销此筛选并还原数据</button>`;
            card.innerHTML = html;
            container.appendChild(card);
        }
        if(!hasDeep) container.innerHTML = '<div style="padding:30px; text-align:center; color:#cbd5e1; font-size:13px; font-weight:600;">暂无活动分析轨道</div>';
    }

    // 开关特定的关联字段
    window.toggleField = (layerName, field, show) => {
        if(show) deepFilterRegistry[layerName].activeFields.add(field);
        else deepFilterRegistry[layerName].activeFields.delete(field);
        refreshMap();
    };

    // 撤销深度筛选
    window.undoDeep = (ln) => {
        deepFilterRegistry[ln].kws = [...state.keywords]; // 还原回首页状态
        deepFilterRegistry[ln].isDeep = false;
        deepFilterRegistry[ln].activeFields.clear();
        deepFilterRegistry[ln].availableHeaders = [];
        refreshMap();
        renderHistoryCards();
    };

    // 8. 其他组件逻辑
    let curM = null;
    map.on('pm:create', (e) => { if(e.shape === 'Marker') { curM = e.layer; document.getElementById('naming-ui').style.display='block'; } });
    document.getElementById('m-save').onclick = () => { if(curM) curM.bindPopup(`<b>${document.getElementById('m-name').value}</b>`).openPopup(); deactivateAll(); };

    document.querySelectorAll('.win-header').forEach(h => {
        let dragging = false, offset = [0,0], win = h.parentElement;
        h.onmousedown = (e) => { dragging = true; offset = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY]; };
        document.onmousemove = (e) => { if(!dragging) return; win.style.left = (e.clientX + offset[0]) + 'px'; win.style.top = (e.clientY + offset[1]) + 'px'; win.style.bottom = 'auto'; win.style.right = 'auto'; };
        document.onmouseup = () => dragging = false;
    });

    fetch('xuhui.json').then(r => r.json()).then(data => L.geoJSON(data, { style: { color: "#2BB5BE", weight: 1.5, fillOpacity: 0.05 }}).addTo(map));
</script>
</body>
</html>
