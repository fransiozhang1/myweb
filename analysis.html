<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>大徐家汇数智化平台 - 深度分析端</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="analysis.css" />
</head>
<body>

<div id="hud-left" style="display: flex; flex-direction: column;">

<div id="deep-filter-win" class="floating-window">
    <div class="win-header"><span>独立轨道筛选与关联</span><span class="close-win">×</span></div>

<div id="data-interact-win" class="floating-window" style="top: 220px; left: 35px; width: 420px; max-height: 75vh;">

    <div style="padding:22px; overflow-y:auto; flex:1;">
        
        <div class="step-box">

<div id="analysis-tools" class="toolbar-group">

<script>
// AOI 分析配置：同步 index.html 的翻译逻辑
const aoiConfig = {
    "buildings_a": { n: "既有建筑底廓", c: "#94a3b8", fields: ["name", "type"] },
    "water_a":     { n: "城市水体/湖泊", c: "#74ccf4", fields: ["name", "fclass"] },
    "landuse_a":   { n: "土地利用现状", c: "#fcd34d", fields: ["name", "fclass"] },
    "transport_a": { n: "交通枢纽范围", c: "#818cf8", fields: ["name", "fclass"] },
    "traffic_a":   { n: "道路交通广场", c: "#475569", fields: ["name", "fclass"] },
    "pois_a":      { n: "公共服务设施面", c: "#f472b6", fields: ["name", "fclass"] },
    "pofw_a":      { n: "宗教文化场所", c: "#c084fc", fields: ["name", "fclass"] }
};
// --- [1] 定义道路分级配置 (解决 ReferenceError) ---
// --- [新增] 道路分级标准与数据映射 (必须放在脚本最顶端) ---
const ROAD_SETTING = {
    "高速公路":   { weight: 10, color: "#F5222D", lineW: 2.8 },
    "城市快速路": { weight: 9,  color: "#EB2F96", lineW: 2.5 },
    "城市主干路": { weight: 8,  color: "#722ED1", lineW: 2.2 },
    "城市次干路": { weight: 7,  color: "#1890FF", lineW: 1.8 },
    "城市支路":   { weight: 6,  color: "#13C2C2", lineW: 1.4 },
    "居住区道路": { weight: 5,  color: "#52C41A", lineW: 1.2 },
    "内部道路":   { weight: 4,  color: "#A0D911", lineW: 1.0 },
    "辅助道路":   { weight: 3,  color: "#FAAD14", lineW: 1.0 },
    "人行绿道":   { weight: 2,  color: "#FA8C16", lineW: 1.0 },
    "其他":       { weight: 1,  color: "#8C8C8C", lineW: 0.8 }
};

const ROAD_MAP = {
    'motorway': '高速公路',
    'motorway_link': '高速公路',

    'trunk': '城市快速路',
    'trunk_link': '城市快速路',

    'primary': '城市主干路',
    'primary_link': '城市主干路',

    'secondary': '城市次干路',
    'secondary_link': '城市次干路',

    'tertiary': '城市支路',
    'tertiary_link': '城市支路',

    'residential': '居住区道路',
    'living_street': '居住区道路',

    'service': '内部道路',
    'track': '内部道路',

    'pedestrian': '人行绿道',
    'footway': '人行绿道',
    'path': '人行绿道',

    // 建议新增
    'unclassified': '城市支路',
    'road': '城市支路'
};
const API_KEY = "sk-953b1a97918949d2a18c9a07a14729d0";
// 街景语义颜色配置
const svColors = { "road": "#808080", "sidewalk": "#FF00FF", "vegetation": "#228B22", "sky": "#87CEEB", "building": "#A52A2A", "car": "#0000FF", "person": "#FF0000" };

function generatePieChart(props) {
    const data = Object.entries(props).filter(([k, v]) => typeof v === 'number' && v > 0.01 && !['lon', 'lat'].includes(k)).sort((a, b) => b[1] - a[1]).slice(0, 10);
    if(!data.length) return '<p style="color:#94a3b8;font-size:11px;">无显著语义数据</p>';
    const total = data.reduce((s, [_, v]) => s + v, 0);
    let curA = 0; const r = 80, cx = 110, cy = 110; let paths = "";
    data.forEach(([label, value], i) => {
        const angle = (value / total) * 2 * Math.PI;
        const x1 = cx + r * Math.cos(curA), y1 = cy + r * Math.sin(curA);
        const x2 = cx + r * Math.cos(curA + angle), y2 = cy + r * Math.sin(curA + angle);
        const color = svColors[label] || `hsl(${(i * 53) % 360}, 60%, 65%)`;
        paths += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${angle>Math.PI?1:0} 1 ${x2} ${y2} Z" fill="${color}" stroke="#fff" onmouseover="showTip(event,'${label}','${(value*100).toFixed(1)}%')" onmouseout="hideTip()"></path>`;
        curA += angle;
    });
    return `<div class="pie-container"><svg width="220" height="220">${paths}</svg></div>`;
}
window.showTip = (e, l, p) => { const t = document.getElementById('pie-tip'); t.style.display = 'block'; t.innerText = `${l}: ${p}`; t.style.left = (e.clientX + 15) + 'px'; t.style.top = (e.clientY + 15) + 'px'; };
window.hideTip = () => { const t = document.getElementById('pie-tip'); if(t) t.style.display = 'none'; };
// --- 1. 指标运算配置 (支持动态扩展) ---
const INDICATOR_CONFIG = {
    "demand_density": {
        name: "小区配送需求密度",
        formula_desc: "需求指数 = 目标数据项 × 系数",
        params: [
            { id: "base_col", name: "目标数据列 (如:总套数)", type: "field_selector" },
            { id: "coeff", name: "配送系数", type: "manual_input", default: "1.0" }
        ],
        calc: (data, params) => (parseFloat(data[params.base_col]) || 0) * parseFloat(params.coeff)
    }
};

// --- 2. 地图初始化 ---
var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);
map.pm.setLang('zh');

// --- 3. 状态管理 ---
const state = JSON.parse(localStorage.getItem('analysis_state')) || { keywords: [], activeLayers: [] };
const pool = {};

function getPoiColor(name) {
    const colorMap = {
        "餐饮服务": "#ef4444",
        "风景名胜": "#f59e0b",
        "公共设施": "#64748b",
        "公司企业": "#3b82f6",
        "购物服务": "#ec4899",
        "交通设施服务": "#06b6d4",
        "金融保险服务": "#8b5cf6",
        "科教文化服务": "#22c55e",
        "摩托车服务": "#f97316",
        "汽车服务": "#0ea5e9",
        "汽车维修": "#78716c",
        "汽车销售": "#14b8a6",
        "商务住宅": "#84cc16",
        "生活服务": "#e11d48",
        "室内设施": "#a855f7",
        "体育休闲服务": "#10b981",
        "通行设施": "#6366f1",
        "虚拟数据": "#94a3b8",
        "医疗保健服务": "#dc2626",
        "政府机构及社会团体": "#475569",
        "住宿服务": "#f97316",
        "房产数据": "#FF7E5F",
        "街景语义分割图点": "#2BB5BE"
    };

    return colorMap[name] || "#2BB5BE";
}
const displayLayers = {};    
let csvGlobalMap = {};       
let activeCalculations = []; 

// 深度筛选注册表
let deepFilterRegistry = {};
state.activeLayers.forEach(name => {
    deepFilterRegistry[name] = { 
        kws: state.keywords.length > 0 ? [...state.keywords] : [], 
        activeFields: new Set(), 
        availableHeaders: [], 
        isDeep: false 
    };
});

// 升级版清洗逻辑：非贪婪匹配 + 深度去噪
const normalize = (n) => {
    if (!n) return "";
    return n.toString()
        .replace(/^[0-9]+[.\u3001\s]+/g, "") // 去除开头的序号
        .replace(/[\uff01-\uff5e]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xfee0)) // 全角转半角
        .replace(/\s+/g, "") // 去除所有空格
        // --- 核心修复：非贪婪匹配括号，只删除括号内容，不误删中间文字 ---
        .replace(/\([^)]*\)|（[^）]*）|\[[^\]]*\]|【[^】]*】/g, "") 
        .replace(/有限责任公司|有限公司|责任公司|分公司|办事处/g, "") 
        // --- 核心修复：增加对业务后缀的深度过滤 ---
        .replace(/路店|分店|店|分部|分局|社区|商铺|超市|驿站|项目|街道|餐厅|馆/g, "") 
        .replace(/[.,\/#!$%\^&\*;:{}=\-_`~]/g, "") 
        .replace(/[\u3002\uff1b\uff0c\uff1a\u201c\u201d\uff08\uff09\u300a\u300b\u3008\u3009\u3010\u3011\uff1f\uff01]/g, "") 
        .trim().toLowerCase();
};


function parseCsvLine(line) {
    const result = [];
    let cur = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
        const ch = line[i];

        if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') {
                cur += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (ch === ',' && !inQuotes) {
            result.push(cur.trim());
            cur = "";
        } else {
            cur += ch;
        }
    }

    result.push(cur.trim());
    return result;
}

function detectNameColumnIndex(headers) {
    const idx = headers.findIndex(h => /名称|店名|name|小区|项目|楼盘|地址/i.test(h));
    return idx >= 0 ? idx : 0;
}

function getFeatureCandidateKeys(p) {
    const rawCandidates = [
        p.name,
        p.type,
        p.fclass,
        p.address,
        p.名称,
        p.项目名,
        p.楼盘名
    ].filter(Boolean);

    const normalized = rawCandidates
        .map(v => normalize(v))
        .filter(Boolean);

    return [...new Set(normalized)];
}

function findCsvRowByFeature(p) {
    const keys = getFeatureCandidateKeys(p);

    for (const key of keys) {
        if (csvGlobalMap[key]) return csvGlobalMap[key];
    }

    for (const key of keys) {
        const fuzzyKey = Object.keys(csvGlobalMap).find(k => k.includes(key) || key.includes(k));
        if (fuzzyKey) return csvGlobalMap[fuzzyKey];
    }

    return null;
}

function hasCsvRowForFeature(p) {
    return !!findCsvRowByFeature(p);
}

// --- 4. 交互排他逻辑 ---
function deactivateAll() {
    document.querySelectorAll('.floating-window').forEach(w => w.style.display = 'none');
    document.querySelectorAll('.tool-btn, .big-action-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('naming-ui').style.display = 'none';
    map.pm.disableDraw();
}
window.addEventListener('keydown', (e) => { if(e.key === 'Escape') deactivateAll(); });

const setupBtn = (id, action) => {
    document.getElementById(id).onclick = () => {
        const wasActive = document.getElementById(id).classList.contains('active');
        deactivateAll();
        if(!wasActive) { action(); document.getElementById(id).classList.add('active'); }
    };
};

setupBtn('btn-layer-t', () => document.getElementById('layer-menu').style.display = 'flex');
setupBtn('btn-deep-filter', () => { renderDeepUI(); document.getElementById('deep-filter-win').style.display = 'flex'; });
setupBtn('btn-data-interact', () => { initInteractUI(); document.getElementById('data-interact-win').style.display = 'flex'; });
setupBtn('btn-ruler', () => map.pm.enableDraw('Line', { measurements: { showLength: true } }));
setupBtn('btn-poly', () => map.pm.enableDraw('Polygon', { measurements: { showArea: true } }));
setupBtn('btn-marker', () => map.pm.enableDraw('Marker'));
document.getElementById('tool-eraser').onclick = () => map.pm.toggleGlobalRemovalMode();
document.querySelectorAll('.close-win').forEach(c => c.onclick = deactivateAll);

// --- 5. 渲染引擎：核心修复（不再强制依赖 CSV） ---
// analysis.html
// analysis.html
// analysis.html
function refreshMap() {
    for (let name in displayLayers) {
        const layerGroup = displayLayers[name].layer;
        const conf = displayLayers[name].conf;
        const isR = !!ROAD_SETTING[name]; 
        const isA = aoiConfig[name];
        const reg = deepFilterRegistry[name]; // 必须获取该轨道的筛选注册表

        layerGroup.clearLayers();

        if (conf.visible && pool[name]) {
           // analysis.html
L.geoJSON(pool[name], {
    // 1. 坐标修正：处理 GeoJSON 的 [lng, lat] 到 Leaflet 的 [lat, lng] 转换
    coordsToLatLng: (c) => L.latLng(c[1], c[0]),
    
    // 2. 核心过滤器：整合分类识别、AI 关键词与 CSV 校验
filter: (f) => {
    if (!reg || !reg.isDeep) return true;

    const p = f.properties || {};
    const featureName = [
        p.name && p.name !== "None" ? p.name : "",
        p.type || "",
        p.fclass || "",
        p.address || ""
    ].join(" ");

    const matchStr = normalize(featureName);

    const isKeywordMatch = reg.kws.some(kw => {
        const tk = normalize(kw);
        return tk && (matchStr.includes(tk) || tk.includes(matchStr));
    });

    if (!isKeywordMatch) return false;

    const hasData = hasCsvRowForFeature(p);
    return hasData;
    },

    // 3. 样式引擎：支持路网高亮与 AOI 渲染
    style: (f) => {
        const isDeep = reg && reg.isDeep;
        if (isR) {
            return { 
                color: isDeep ? '#FF7E5F' : conf.c, 
                weight: isDeep ? ROAD_SETTING[name].lineW + 2 : ROAD_SETTING[name].lineW, 
                opacity: 1.0, 
                lineJoin: 'round',
                className: isDeep ? 'road-match-highlight' : '' // 对应 analysis.css 中的动画
            };
        }
        if (isA) return { color: conf.c, weight: 1.5, fillColor: conf.c, fillOpacity: 0.35, opacity: 0.8 };
    },

    // 4. 点位渲染：将点数据渲染为圆点
    pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 7, fillColor: conf.c, color: "#fff", weight: 2, fillOpacity: 0.9 }),
    
    // 5. 交互与弹窗：整合 CSV 字段和计算结果
    onEachFeature: (f, l) => {
        if (isR) l.bringToFront(); // 线条置顶显示
        const p = f.properties;
        
        // 标题优化：避免显示 "None" 或 undefined
        const title = (p.name && p.name !== 'None') ? p.name : (isR ? name : (isA ? isA.n : "空间要素"));
        let h = `<div class="popup-header ${name.includes('房产') ? 'house' : ''}"><h3>${title}</h3></div><div style="padding:15px; font-size:12px;">`;

        if (isR) {
            h += `<div class="popup-info-row">道路属性</div>`;
            h += `<div><b>所属等级:</b> ${name}</div>`;
            if(p.name && p.name !== "None") h += `<div><b>路段名称:</b> ${p.name}</div>`;
        } else if (isA) {
            h += `<div class="popup-info-row">${isA.n} 属性详情</div>`;
            isA.fields.forEach(field => { if (p[field]) h += `<div><b>${field}:</b> ${p[field]}</div>`; });
        } else if (name.includes('街景')) {
            h += `<div class="popup-info-row">语义分析</div>` + generatePieChart(p);
        } else {
            h += `<div><b>地址:</b> ${p.address || '-'}</div>`;
        }

        // 5.1 获取关联的 CSV 数据行
        let csvRow = findCsvRowByFeature(p) || {};

        // 5.2 渲染勾选的 CSV 字段
        if (reg && reg.activeFields) {
            reg.activeFields.forEach(field => {
                if (csvRow[field]) {
                    h += `<div style="margin-top:8px; color:var(--primary); font-weight:700; border-top:1px dashed #eee; padding-top:4px;">${field}: ${csvRow[field]}</div>`;
                }
            });
        }

        // 5.3 动态指标计算结果展示
        activeCalculations.forEach(calc => {
            if (calc.layerNames.includes(name)) {
                const result = INDICATOR_CONFIG[calc.configKey].calc({ ...p, ...csvRow }, calc.params);
                h += `<div class="calc-box"><b>${calc.name}</b><span>${result.toFixed(2)}</span></div>`;
            }
        });

        l.bindPopup(h + `</div>`, { maxWidth: 280 });
    }
}).addTo(layerGroup);
        }
    }
    map.invalidateSize();
}

// --- 6. AI 筛选逻辑 (保持不变) ---
let sessionHeaders = [];
function renderDeepUI() {
    document.getElementById('deep-layer-targets').innerHTML = state.activeLayers.map(n => {
        // 关键转换：尝试匹配 AOI 中文名
        const label = aoiConfig[n] ? aoiConfig[n].n : (n.includes('街景') ? '街景语义分割图' : n);
        return `<div class="layer-item" style="padding:6px 10px; margin-bottom:5px;">
            <input type="checkbox" class="target-cb" value="${n}" checked>
            <span>${label}</span>
        </div>`;
    }).join('');
    renderHistoryCards();
}

document.getElementById('deep-file-in').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('file-name').innerText = file.name;

    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
        if (!lines.length) return;

        sessionHeaders = parseCsvLine(lines[0]).map(h => h.trim());
        const nameIdx = detectNameColumnIndex(sessionHeaders);

        lines.slice(1).forEach(line => {
            const vals = parseCsvLine(line);
            const obj = {};

            sessionHeaders.forEach((h, i) => {
                obj[h] = (vals[i] || "").trim();
            });

            const rawName = obj[sessionHeaders[nameIdx]];
            const key = normalize(rawName);

            if (key) csvGlobalMap[key] = obj;
        });
    };

    reader.readAsText(file);
};

document.getElementById('btn-run-deep').onclick = async () => {
    const selected = Array.from(document.querySelectorAll('.target-cb:checked')).map(cb => cb.value);
    const file = document.getElementById('deep-file-in').files[0];
    if(!selected.length || !file) return alert("请配置目标图层并上传文件");
    
    document.getElementById('deep-log').innerText = "⏳ 正在提取本地列并调用低成本 AI...";

    try {
        // --- 措施 1：本地读取文件并仅提取第一列 (名称列) ---
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const content = ev.target.result;
            const lines = content.split('\n').filter(l => l.trim());
            // 提取第一列数据，并限制条数（如 500 条）以防超出单次 Token 限制
            const headers = parseCsvLine(lines[0]).map(h => h.trim());
const nameIdx = detectNameColumnIndex(headers);

const nameList = lines
    .slice(1, 501)
    .map(line => {
        const vals = parseCsvLine(line);
        return (vals[nameIdx] || "").trim();
    })
    .filter(Boolean)
    .join(',');

            // --- 措施 2：调用北京地域低成本模型 Qwen-Doc-Turbo ---
            const aiRes = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                method: "POST", 
                headers: {
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({ 
                    model: "qwen-doc-turbo", //
                    messages: [
                        { role: "system", content: "你是一个专业的城市规划助手。请从用户提供的名称列表中，提取出与当前选定分类相关的名称。" },
                        { role: "user", content: `请从以下列表中提取相关名称，仅返回名称，用英文逗号分隔，严禁输出任何解释性文字或思考过程：${nameList}` }
                    ],
                    // --- 措施 3：关闭思考模式，节省 80% 输出费用 ---
                    extra_body: {
                        "enable_thinking": false //
                    }
                })
            });

            const result = await aiRes.json();
            if(result.error) throw new Error(result.error.message);

            const rawContent = result.choices[0].message.content;
            const names = rawContent.replace(/\n/g, ",").split(/[，,]/)
                .map(n => n.replace(/^[0-9]+[.\u3001\s]+/g, "").trim())
                .filter(n => n && n.length > 1);

            // 应用筛选逻辑 (保持你的独立轨道重置逻辑)
            selected.forEach(ln => {
                deepFilterRegistry[ln].kws = names;
                deepFilterRegistry[ln].isDeep = true;
                deepFilterRegistry[ln].availableHeaders = [...sessionHeaders]; 
                deepFilterRegistry[ln].activeFields = new Set(); 
            });

            document.getElementById('deep-file-in').value = ""; 
            refreshMap(); 
            renderHistoryCards(); 
            document.getElementById('deep-log').innerText = `✅ 成功：AI 从 ${lines.length} 行中提取了 ${names.length} 类目标`;
        };
        reader.readAsText(file);

    } catch(e) { 
        document.getElementById('deep-log').innerText = "❌ 运行异常：" + e.message; 
    }
};

function renderHistoryCards() {
    const container = document.getElementById('filter-history-container');
    container.innerHTML = '';
    for(let ln in deepFilterRegistry) {
        if(!deepFilterRegistry[ln].isDeep) continue;
        const reg = deepFilterRegistry[ln];
        // 关键转换：卡片标题中文化
        const label = aoiConfig[ln] ? aoiConfig[ln].n : (ln.includes('街景') ? '街景语义分割图' : ln);
        const card = document.createElement('div'); card.className = 'history-card';
        const fieldTags = reg.availableHeaders.map(h => `<label class="field-checkbox-item"><input type="checkbox" ${reg.activeFields.has(h)?'checked':''} onchange="toggleCardField('${ln}', '${h}', this.checked)">${h}</label>`).join('');
        card.innerHTML = `<div class="calc-title"><b>${label}</b> <button class="btn-del-calc" onclick="undoDeep('${ln}')">撤销</button></div><div class="calc-details">已匹配: ${reg.kws.length}类</div><div class="history-field-zone">${fieldTags || '无属性'}</div>`;
        container.appendChild(card);
    }
}
window.toggleCardField = (ln, f, check) => { if(check) deepFilterRegistry[ln].activeFields.add(f); else deepFilterRegistry[ln].activeFields.delete(f); refreshMap(); };
window.undoDeep = (ln) => { deepFilterRegistry[ln].isDeep = false; deepFilterRegistry[ln].kws = state.keywords.length > 0 ? [...state.keywords] : []; deepFilterRegistry[ln].activeFields.clear(); refreshMap(); renderHistoryCards(); };

// --- 7. 数据计算 UI：修复独立性 (不依赖 AI 筛选) ---
function initInteractUI() {
    const select = document.getElementById('select-indicator');
    select.innerHTML = '<option value="">-- 选择指标 --</option>';
    for(let key in INDICATOR_CONFIG) select.innerHTML += `<option value="${key}">${INDICATOR_CONFIG[key].name}</option>`;
    
    select.onchange = (e) => {
    const config = INDICATOR_CONFIG[e.target.value];
    if(!config) { document.getElementById('calc-param-zone').style.display='none'; return; }
    document.getElementById('calc-param-zone').style.display='block';
    document.getElementById('formula-box').innerText = config.formula_desc;

    // --- 核心修改：同时生成“原始字段组”和“关联数据组” ---
    let baseLayersHtml = ""; // 存放图层原始属性
    let csvLayersHtml = "";  // 存放关联的 CSV 属性

    state.activeLayers.forEach(ln => {
        const label = aoiConfig[ln] ? aoiConfig[ln].n : (ln.includes('街景') ? '街景语义分割图' : ln);
        
        // 1. 生成 1 级数据组：图层原始基础属性
        if(pool[ln] && pool[ln].features && pool[ln].features[0]) {
            const fields = Object.keys(pool[ln].features[0].properties);
            baseLayersHtml += `<optgroup label="[基础图层] ${label}">`;
            fields.forEach(f => { baseLayersHtml += `<option value="${f}">${f}</option>`; });
            baseLayersHtml += `</optgroup>`;
        }

        // 2. 生成 2 级数据组：该图层关联的 CSV 字段 (这是新增的人文关怀点)
        const reg = deepFilterRegistry[ln];
        if(reg && reg.availableHeaders.length > 0) {
            csvLayersHtml += `<optgroup label="[关联数据] ${label}">`;
            reg.availableHeaders.forEach(h => { csvLayersHtml += `<option value="${h}">${h}</option>`; });
            csvLayersHtml += `</optgroup>`;
        }
    });

    // --- 渲染 UI：将两部分 HTML 注入 ---
    document.getElementById('param-inputs-container').innerHTML = config.params.map(p => `
        <div style="margin-bottom:12px;">
            <label style="font-size:11px; font-weight:700; color:var(--primary);">${p.name}</label>
            ${p.type === 'field_selector' ? 
                `<select class="param-input" data-pid="${p.id}">
                    <option value="">-- 请选择数据源 --</option>
                    ${baseLayersHtml} 
                    ${csvLayersHtml}
                </select>` : 
                `<input type="text" class="param-input input-coeff" data-pid="${p.id}" value="${p.default}">`
            }
        </div>`).join('');

    // 目标图层勾选列表保持不变
    document.getElementById('calc-layer-targets').innerHTML = state.activeLayers.map(n => {
        const label = aoiConfig[n] ? aoiConfig[n].n : (n.includes('街景') ? '街景语义分割图' : n);
        return `<div class="layer-item" style="padding:6px 10px;">
            <input type="checkbox" class="calc-target-cb" value="${n}" checked>
            <span>${label}</span>
        </div>`;
    }).join('');
};
}

document.getElementById('btn-execute-calc').onclick = () => {
    const configKey = document.getElementById('select-indicator').value;
    const selected = Array.from(document.querySelectorAll('.calc-target-cb:checked')).map(cb => cb.value);
    if(!configKey || !selected.length) return alert("参数缺失");
    const params = {}; document.querySelectorAll('.param-input').forEach(i => params[i.dataset.pid] = i.value);
    activeCalculations.push({ id: Date.now(), name: INDICATOR_CONFIG[configKey].name, configKey, layerNames: selected, params });
    refreshMap(); renderCalcHistory();
};

function renderCalcHistory() {
    document.getElementById('calc-history-list').innerHTML = activeCalculations.map(c => `
        <div class="calc-card"><div class="calc-title"><span>${c.name}</span><button class="btn-del-calc" onclick="deleteCalc(${c.id})">删除</button></div></div>`).join('');
}
window.deleteCalc = (id) => { activeCalculations = activeCalculations.filter(c => c.id !== id); refreshMap(); renderCalcHistory(); };

// --- 8. 启动加载 ---
// analysis.html
// analysis.html
state.activeLayers.forEach(name => {
    const isR = !!ROAD_SETTING[name];
    const isA = aoiConfig[name];
    const isH = name.includes('房产');
    const isS = name.includes('街景');

    let loadPromise;
    let color = isR ? ROAD_SETTING[name].color : (isA ? isA.c : getPoiColor(name));
    let label = isA ? isA.n : (isS ? '街景语义分割图' : name);

    if (isR) {
        // 路网：3 个分片
        const files = [
            'shanghai_roads_nw_part1.json',
            'shanghai_roads_nw_part2.json',
            'shanghai_roads_nw_part3.json'
        ];

        loadPromise = Promise.all(files.map(f => fetch(f).then(r => r.json()))).then(dataArray => {
            const allFeatures = dataArray.flatMap(d => d.features);
            return {
                type: "FeatureCollection",
                features: allFeatures.filter(f => {
                    const p = f.properties;
                    let actualType = p.type || ROAD_MAP[p.fclass] || p.fclass || "其他";

                    if (actualType.includes("高速")) actualType = "高速公路";
                    else if (actualType.includes("快速")) actualType = "城市快速路";
                    else if (actualType.includes("主干")) actualType = "城市主干路";
                    else if (actualType.includes("次干")) actualType = "城市次干路";
                    else if (actualType.includes("支路")) actualType = "城市支路";

                    return actualType === name;
                })
            };
        });

    } else if (isS) {
        // 街景：同步 index.html，加载两个分卷
        const files = ['street_view_data_1.json', 'street_view_data_2.json'];
        loadPromise = Promise.all(files.map(f => fetch(f).then(r => r.json()))).then(dataArray => ({
            type: "FeatureCollection",
            features: dataArray.flatMap(d => d.features || [])
        }));

    } else if (name === "buildings_a") {
        // 建筑 AOI：同步 index.html，加载三个分卷
        const parts = ['part1', 'part2', 'part3'];
        loadPromise = Promise.all(
            parts.map(p =>
                fetch(`data_aoi/gis_osm_buildings_a_free_1_${p}.json`).then(r => r.json())
            )
        ).then(dataArray => ({
            type: "FeatureCollection",
            features: dataArray.flatMap(d => d.features || [])
        }));

    } else if (isA) {
        // 其他 AOI：单文件
        loadPromise = fetch(`data_aoi/gis_osm_${name}_free_1.json`).then(r => r.json());

    } else if (isH) {
        // 房产
        loadPromise = fetch('houses.json').then(r => r.json());

    } else {
        // POI
        loadPromise = fetch(`data_poi/${name}.json`).then(r => r.json());
    }

    loadPromise.then(data => {
        pool[name] = data;

        let container = isR
            ? 'road-layers-container'
            : (isA ? 'aoi-list-ui' : (isS ? 'street-list-ui' : 'active-category-list'));

        initLayerControl(name, color, container, label, isR);
    }).catch(err => console.error("加载失败:", name, err));
});

// 核心修复：重命名为 initLayerControl 并增加 label 参数
// analysis.html
// analysis.html 约第 324 行
function initLayerControl(name, color, containerId, label, isR = false) {
    displayLayers[name] = { layer: L.layerGroup().addTo(map), conf: { c: color, visible: true } };
    
    const displayName = label || name;
    const div = document.createElement('div'); 
    div.className = 'layer-item';
    
    // 如果是路网数据(isR)，显示线段图例；否则显示圆点图例
    const legendHtml = isR 
        ? `<div class="legend-line" style="background:${color}; width:20px; height:3px; border-radius:1px; margin-right:12px; flex-shrink:0;"></div>`
        : `<div class="legend-dot" style="background:${color}; width:10px; height:10px; border-radius:50%; margin-right:12px; flex-shrink:0;"></div>`;

    div.innerHTML = `
        <input type="checkbox" checked style="flex-shrink:0;">
        ${legendHtml}
        <span style="font-weight:600; font-size:13px; white-space:nowrap;">${displayName}</span>
    `;
    
    div.querySelector('input').onchange = (e) => { 
        displayLayers[name].conf.visible = e.target.checked; 
        refreshMap(); // 切换 checkbox 时刷新地图显示
    };
    
    const container = document.getElementById(containerId);
    if(container) container.appendChild(div);
    refreshMap();
}

let curM = null;
map.on('pm:create', (e) => { if(e.shape === 'Marker') { curM = e.layer; document.getElementById('naming-ui').style.display='block'; } });
document.getElementById('m-save').onclick = () => { if(curM) curM.bindPopup(`<b>${document.getElementById('m-name').value}</b>`).openPopup(); deactivateAll(); };

document.querySelectorAll('.win-header').forEach(h => {
    let dr = false, of = [0,0], win = h.parentElement;
    h.onmousedown = (e) => { dr = true; of = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY]; };
    document.onmousemove = (e) => { if(!dr) return; win.style.left = (e.clientX + of[0]) + 'px'; win.style.top = (e.clientY + of[1]) + 'px'; win.style.bottom = 'auto'; win.style.right = 'auto'; };
    document.onmouseup = () => dr = false;
});
fetch('xuhui.json').then(r => r.json()).then(data => L.geoJSON(data, { style: { color: "#2BB5BE", weight: 1.5, fillOpacity: 0.05 }}).addTo(map));
