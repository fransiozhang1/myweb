<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化平台 - 深度分析端</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="analysis.css" />
</head>
<body>

<div id="hud-left">
    <div id="header">
        <h1>大徐家汇数智化平台</h1>
        <p>● 深度分析模式 (全品类支持)</p>
    </div>
    <button id="btn-deep-filter" class="big-action-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 19l-7-7 7-7"/><path d="M8.5 12h13"/></svg>
        AI 深度关联分析
    </button>
</div>

<div id="analysis-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-layer-t" title="分析控制面板">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
</div>

<div id="editor-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-ruler" title="测距">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20L5 6M9 6l3 3M12 9l3 3M15 12l3 3"/></svg>
    </div>
    <div class="tool-btn" id="btn-poly" title="绘面/面积">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/></svg>
    </div>
    <div class="tool-btn" id="btn-marker" title="点标注">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
    <div class="tool-btn danger" id="btn-eraser" title="橡皮擦">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17l-10-10"/></svg>
    </div>
</div>

<div id="deep-filter-win" class="floating-window">
    <div class="win-header"><span>AI 语义提取与数据关联</span><span class="close-win">×</span></div>
    <div style="padding:25px; display:flex; flex-direction:column; gap:15px;">
        <div style="border:2px dashed #e2e8f0; padding:20px; border-radius:16px; text-align:center; background:#fafafa;">
            <input type="file" id="deep-file-in" style="display:none;" accept=".csv,.txt">
            <label for="deep-file-in" style="cursor:pointer; color:var(--primary); font-weight:800;">点击上传 CSV 参考文件</label>
            <div id="file-name" style="font-size:11px; color:#94a3b8; margin-top:10px;">关联当前图层所有点位</div>
        </div>

        <div id="csv-fields-ui" style="display:none;">
            <div class="group-label">关联显示字段 (勾选后同步至弹窗)</div>
            <div id="csv-col-container"></div>
        </div>

        <button id="btn-run-deep" style="background:var(--primary); color:white; border:none; padding:14px; border-radius:12px; font-weight:800; cursor:pointer;">开始 AI 智能分析</button>
        <button id="btn-restore-deep" style="background:#f1f5f9; color:#64748b; border:none; padding:10px; border-radius:12px; display:none; cursor:pointer;">取消提取还原</button>
        <div id="deep-log" style="font-size:11px; color:var(--primary); text-align:center; font-weight:600;"></div>
    </div>
</div>

<div id="layer-menu" class="floating-window">
    <div class="win-header"><span>分析控制面板</span><span class="close-win">×</span></div>
    <div style="padding:20px; overflow-y:auto; flex:1;">
        <div class="group-label">活跃数据大类</div>
        <div id="active-category-list"></div>
    </div>
</div>

<div id="naming-ui">
    <h3 style="margin-top:0; font-size:18px; color:#1e293b;">为标注点命名</h3>
    <input type="text" id="m-name" placeholder="名称...">
    <button id="m-save">确认保存</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<script>
    const API_KEY = "sk-953b1a97918949d2a18c9a07a14729d0";

    // 1. 地图初始化
    var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);
    map.pm.setLang('zh');
    map.pm.addControls({ drawControls: false, editControls: false });

    // 2. 状态管理
    const state = JSON.parse(localStorage.getItem('analysis_state')) || { keywords: [], activeLayers: [] };
    let currentKeywords = [...state.keywords];
    let originalStateKeywords = [...state.keywords];
    const pool = {}, displayLayers = {};
    
    // CSV 关联核心缓存
    let csvDataMap = {}; 
    let activeCsvFields = new Set(); 

    // 通用名称清洗函数 (确保全品类匹配成功率)
    const normalize = (name) => {
        if (!name) return "";
        return name.toString()
            .replace(/\(.*\)|（.*）/g, "") // 删除括号及内容
            .replace(/有限公司|责任公司|分店|社区|商铺|超市|驿站/g, "") // 删除常见后缀
            .trim()
            .toLowerCase();
    };

    // 3. 交互与排他性逻辑
    function deactivateAll() {
        document.querySelectorAll('.floating-window').forEach(w => w.style.display = 'none');
        document.querySelectorAll('.tool-btn, .big-action-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('naming-ui').style.display = 'none';
        map.pm.disableDraw();
        map.pm.disableGlobalRemovalMode();
    }
    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') deactivateAll(); });

    const setupBtn = (id, action) => {
        const btn = document.getElementById(id);
        btn.onclick = () => {
            const was = btn.classList.contains('active');
            deactivateAll();
            if(!was) { action(); btn.classList.add('active'); }
        };
    };

    setupBtn('btn-layer-t', () => document.getElementById('layer-menu').style.display = 'flex');
    setupBtn('btn-deep-filter', () => document.getElementById('deep-filter-win').style.display = 'flex');
    setupBtn('btn-ruler', () => map.pm.enableDraw('Line', { measurements: { displayUnit: 'metric', showLength: true } }));
    setupBtn('btn-poly', () => map.pm.enableDraw('Polygon', { measurements: { displayUnit: 'metric', showArea: true } }));
    setupBtn('btn-marker', () => map.pm.enableDraw('Marker'));
    setupBtn('btn-eraser', () => map.pm.toggleGlobalRemovalMode());

    document.querySelectorAll('.close-win').forEach(c => c.onclick = deactivateAll);

    // 4. 核心渲染引擎 (全品类兼容)
    function refreshMap() {
        for(let name in displayLayers) {
            const conf = displayLayers[name].conf;
            map.removeLayer(displayLayers[name].layer);
            
            if(conf.visible) {
                displayLayers[name].layer = L.geoJSON(pool[name], {
                    filter: (f) => {
                        if(currentKeywords.length === 0) return true;
                        const fName = f.properties.name || "";
                        return currentKeywords.some(kw => fName.includes(kw));
                    },
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 7, weight: 2.0, fillColor: conf.c, color: "#fff", fillOpacity: 0.9 }),
                    onEachFeature: (f, l) => {
                        const p = f.properties;
                        // 统一弹窗样式
                        let h = `<div class="popup-header ${name.includes('房产')?'house':''}"><h3>${p.name}</h3></div><div style="padding:15px; font-size:12px;">`;
                        h += `<div style="margin-bottom:8px;"><b>基础地址:</b> ${p.address || '-'}</div>`;
                        
                        // 尝试在 CSV 缓存中寻找匹配数据
                        const matchKey = normalize(p.name);
                        if(csvDataMap[matchKey]) {
                            const row = csvDataMap[matchKey];
                            activeCsvFields.forEach(field => {
                                if(row[field]) {
                                    h += `<div style="margin-top:8px; color:var(--primary); border-top:1px dashed #eee; padding-top:5px;"><b>${field}:</b> ${row[field]}</div>`;
                                }
                            });
                        }
                        l.bindPopup(h + `</div>`, { maxWidth: 280 });
                    }
                }).addTo(map);
            }
        }
    }

    // 5. 数据自动加载 (通用路径匹配)
    state.activeLayers.forEach(layerName => {
        // 自动分配颜色
        const color = layerName.includes('房产') ? '#FF7E5F' : `hsl(${(state.activeLayers.indexOf(layerName)*137)%360},65%,50%)`;
        // 通用路径逻辑：如果是根目录没有的，则去 data_poi 找
        const possiblePaths = [`${layerName}.json`, `data_poi/${layerName}.json`, `houses.json` ];
        const path = layerName.includes('房产') ? 'houses.json' : `data_poi/${layerName}.json`;
        
        fetch(path).then(r => r.json()).then(data => {
            pool[layerName] = data;
            displayLayers[layerName] = { layer: L.layerGroup(), conf: { c: color, visible: true } };
            
            const div = document.createElement('div'); div.className = 'layer-item';
            div.innerHTML = `<input type="checkbox" checked><div class="legend-dot" style="background:${color}"></div><span>${layerName}</span>`;
            div.querySelector('input').onchange = (e) => { displayLayers[layerName].conf.visible = e.target.checked; refreshMap(); };
            document.getElementById('active-category-list').appendChild(div);
            
            refreshMap();
        }).catch(err => console.error(`无法加载图层: ${layerName}`, err));
    });

    // 6. CSV 本地预处理逻辑
    document.getElementById('deep-file-in').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('file-name').innerText = file.name;
        const reader = new FileReader();
        reader.onload = (event) => {
            const lines = event.target.result.split('\n').filter(l => l.trim());
            if(lines.length < 2) return;
            const headers = lines[0].split(',').map(h => h.trim());
            
            // 找到包含“名称”特征的列作为索引，否则默认第一列
            const nameIdx = headers.findIndex(h => /名称|店名|商铺|项目|地点|Name/i.test(h)) === -1 ? 0 : headers.findIndex(h => /名称|店名|商铺|项目|地点|Name/i.test(h));
            
            csvDataMap = {};
            lines.slice(1).forEach(line => {
                const vals = line.split(',').map(v => v.trim());
                const row = {};
                headers.forEach((h, i) => row[h] = vals[i]);
                const key = normalize(row[headers[nameIdx]]);
                if(key) csvDataMap[key] = row;
            });

            const container = document.getElementById('csv-col-container');
            container.innerHTML = '';
            document.getElementById('csv-fields-ui').style.display = 'block';
            headers.forEach(h => {
                const div = document.createElement('div'); div.className = 'layer-item';
                div.style = "padding:5px 10px; font-size:12px; margin-bottom:4px;";
                div.innerHTML = `<input type="checkbox"><span>${h}</span>`;
                div.querySelector('input').onchange = (ev) => {
                    if(ev.target.checked) activeCsvFields.add(h); else activeCsvFields.delete(h);
                    refreshMap();
                };
                container.appendChild(div);
            });
        };
        reader.readAsText(file);
    };

    // 7. AI 深度提取与还原
    document.getElementById('btn-run-deep').onclick = async () => {
        const file = document.getElementById('deep-file-in').files[0];
        if(!file) return alert("请上传文件");
        const log = document.getElementById('deep-log'); log.innerText = "⏳ AI 正在跨图层执行语义分析...";
        try {
            const fd = new FormData(); fd.append('file', file); fd.append('purpose', 'file-extract');
            const up = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/files", { method:"POST", headers:{"Authorization":`Bearer ${API_KEY}`}, body:fd });
            const fid = (await up.json()).id;
            const ai = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                method:"POST", headers:{"Content-Type":"application/json", "Authorization":`Bearer ${API_KEY}`},
                body: JSON.stringify({ model:"qwen-long", messages:[{role:"system", content:`fileid://${fid}`}, {role:"user", content:"提取文件中提到的所有具体地点、店铺或项目名称。用逗号分隔，仅返回名称。"}]})
            });
            const names = (await ai.json()).choices[0].message.content.split(/[，,]/).map(n => n.trim()).filter(n => n);
            currentKeywords = names;
            refreshMap();
            log.innerText = `✅ AI 识别到 ${names.length} 个目标并已关联`;
            document.getElementById('btn-restore-deep').style.display = 'block';
        } catch(e) { log.innerText = "❌ 提取失败"; }
    };

    document.getElementById('btn-restore-deep').onclick = () => { 
        currentKeywords = [...originalStateKeywords]; 
        refreshMap(); 
        document.getElementById('btn-restore-deep').style.display = 'none'; 
        document.getElementById('deep-log').innerText = ''; 
        deactivateAll(); 
    };

    // 8. 其他逻辑 (命名与拖拽)
    let curMarker = null;
    map.on('pm:create', (e) => { if(e.shape === 'Marker') { curMarker = e.layer; document.getElementById('naming-ui').style.display='block'; document.getElementById('m-name').focus(); } });
    document.getElementById('m-save').onclick = () => { curMarker.bindPopup(`<b>${document.getElementById('m-name').value}</b>`).openPopup(); deactivateAll(); };

    document.querySelectorAll('.win-header').forEach(h => {
        let dragging = false, offset = [0,0], win = h.parentElement;
        h.onmousedown = (e) => { dragging = true; offset = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY]; };
        document.onmousemove = (e) => { if(!dragging) return; win.style.left = (e.clientX + offset[0]) + 'px'; win.style.top = (e.clientY + offset[1]) + 'px'; win.style.bottom = 'auto'; win.style.right = 'auto'; };
        document.onmouseup = () => dragging = false;
    });

    fetch('xuhui.json').then(r => r.json()).then(data => L.geoJSON(data, { style: { color: "#2BB5BE", weight: 1.5, fillOpacity: 0.05 }}).addTo(map));
</script>
</body>
</html>
