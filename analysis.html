<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化平台 - 分析端</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <style>
        /* 完全继承 index.html 的样式变量 */
        :root { --primary: #2BB5BE; --accent: #FF7E5F; --glass: rgba(255, 255, 255, 0.98); --shadow: 0 10px 35px rgba(0,0,0,0.15); --btn-size: 54px; --icon-size: 22px; --stroke-w: 2.0; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #f0f2f5; }
        #map { width: 100vw; height: 100vh; z-index: 1; }

        #header { position: absolute; top: 30px; left: 35px; z-index: 2000; pointer-events: none; }
        #header h1 { margin: 0; font-size: 28px; font-weight: 800; color: #1e293b; letter-spacing: -1px; }
        #header p { margin: 6px 0 0; font-size: 11px; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .toolbar-group { position: absolute; right: 30px; z-index: 2000; display: flex; flex-direction: column; gap: 15px; }
        #analysis-tools { top: 30px; } 
        #editor-tools { top: 200px; } /* 因为少了筛选，可以往上挪点 */

        .tool-btn { width: var(--btn-size); height: var(--btn-size); background: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); cursor: pointer; border: 1px solid #fff; transition: 0.2s; color: #64748b; }
        .tool-btn svg { width: var(--icon-size); height: var(--icon-size); stroke-width: var(--stroke-w); }
        .tool-btn:hover, .tool-btn.active { color: var(--primary); transform: scale(1.08); border-color: var(--primary); }

        .floating-window { position: absolute; z-index: 2000; background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid #fff; box-shadow: var(--shadow); display: none; flex-direction: column; overflow: hidden; }
        .win-header { padding: 18px 22px; background: #fff; border-bottom: 1px solid #f1f5f9; cursor: move; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        #layer-menu { top: 30px; right: 100px; width: 300px; max-height: 70vh; }
        
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 14px; padding: 0; overflow: hidden; }
        .popup-header { background: var(--primary); color: white; padding: 14px 18px; }
        .popup-header.house { background: var(--accent); }
    </style>
</head>
<body>

<div id="header">
    <h1>大徐家汇数智化平台</h1>
    <p>● 分析模式 (只读已筛选数据)</p>
</div>

<div id="analysis-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-layer-toggle" title="图层控制"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    </div>

<div id="editor-tools" class="toolbar-group">
    <div class="tool-btn" id="draw-ruler" title="测距"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20L5 6M9 6l3 3M12 9l3 3M15 12l3 3"/></svg></div>
    <div class="tool-btn danger" id="tool-eraser" title="橡皮擦"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17l-10-10"/></svg></div>
</div>

<div id="layer-menu" class="floating-window">
    <div class="win-header"><span>当前分析图层</span><span class="close-win">×</span></div>
    <div style="padding:20px; overflow-y:auto; flex:1;" id="analysis-layer-list">
        </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<script>
    var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);

    // --- 分析核心逻辑：读取状态 ---
    const rawState = localStorage.getItem('analysis_state');
    if(!rawState) { alert("未检测到分析数据，请返回首页。"); window.location.href='index.html'; }
    const state = JSON.parse(rawState);

    // 自动加载图层函数 (逻辑与 index 类似但带过滤)
    function loadAnalyzedData(name, color, type) {
        const path = type === 'house' ? 'houses.json' : `data_poi/${name}.json`;
        fetch(path).then(r => r.json()).then(data => {
            L.geoJSON(data, {
                filter: (f) => {
                    if (state.keywords.length === 0) return true;
                    return state.keywords.some(k => f.properties.name.includes(k));
                },
                pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 5, weight: 1.5, fillColor: color, color: "#fff", fillOpacity: 0.9 }),
                onEachFeature: (f, l) => {
                    const p = f.properties;
                    let h = `<div class="popup-header ${type==='house'?'house':''}"><h3>${p.name}</h3></div><div style="padding:15px; font-size:12px;">`;
                    h += `<div>地址: ${p.address || '-'}</div></div>`;
                    l.bindPopup(h);
                }
            }).addTo(map);
            
            // 在侧边栏显示这个图层的状态
            const div = document.createElement('div');
            div.style="display:flex; align-items:center; padding:10px; border-bottom:1px solid #eee;";
            div.innerHTML = `<div style="width:8px; height:8px; border-radius:50%; background:${color}; margin-right:12px;"></div><span>${name}</span>`;
            document.getElementById('analysis-layer-list').appendChild(div);
        });
    }

    // 执行加载
    state.activeLayers.forEach(name => {
        // 根据名称分配颜色 (逻辑需与 index 保持一致)
        const color = name === '房产项目' ? '#FF7E5F' : `hsl(${(state.activeLayers.indexOf(name) * 137.5) % 360}, 65%, 55%)`;
        loadAnalyzedData(name, color, name === '房产项目' ? 'house' : 'poi');
    });

    // 基础边界
    fetch('xuhui.json').then(r => r.json()).then(data => L.geoJSON(data, { style: { color: "#2BB5BE", weight: 1.5, fillOpacity: 0.05 }}).addTo(map));

    // 交互与 Geoman (测距等功能保持)
    document.getElementById('btn-layer-toggle').onclick = () => document.getElementById('layer-menu').style.display = 'flex';
    document.querySelectorAll('.close-win').forEach(c => c.onclick = () => c.closest('.floating-window').style.display='none');
    map.pm.setLang('zh');
    document.getElementById('draw-ruler').onclick = () => map.pm.enableDraw('Line', { measurements: { showLength: true } });
</script>
</body>
</html>
