<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化平台 - 分析端</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <style>
        :root { --primary: #2BB5BE; --accent: #FF7E5F; --glass: rgba(255, 255, 255, 0.98); --shadow: 0 12px 45px rgba(0,0,0,0.15); --btn-size: 54px; --icon-size: 22px; --stroke-w: 2.0; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #f0f2f5; }
        #map { width: 100vw; height: 100vh; z-index: 1; }

        #header-hud { position: absolute; top: 30px; left: 35px; z-index: 2000; pointer-events: none; }
        #header h1 { margin: 0; font-size: 28px; font-weight: 800; color: #1e293b; letter-spacing: -1px; }
        #header p { margin: 5px 0 0; font-size: 12px; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .toolbar-group { position: absolute; right: 30px; z-index: 2000; display: flex; flex-direction: column; gap: 15px; }
        #analysis-tools { top: 30px; } 
        #editor-tools { top: 150px; } /* 布局更紧凑 */

        .tool-btn { width: var(--btn-size); height: var(--btn-size); background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); cursor: pointer; border: 1px solid #fff; transition: 0.2s; color: #64748b; }
        .tool-btn svg { width: var(--icon-size); height: var(--icon-size); stroke-width: var(--stroke-w); }
        .tool-btn:hover, .tool-btn.active { color: var(--primary); transform: scale(1.08); border-color: var(--primary); }
        .tool-btn.danger:hover { color: #ff4757; border-color: #ff4757; }

        /* 浮动窗口 */
        .floating-window { position: absolute; z-index: 2000; background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid #fff; box-shadow: var(--shadow); display: none; flex-direction: column; overflow: hidden; }
        .win-header { padding: 18px 22px; background: #fff; border-bottom: 1px solid #f1f5f9; cursor: move; display: flex; justify-content: space-between; align-items: center; font-weight: 700; color: #334155; }
        #layer-menu { top: 30px; right: 100px; width: 320px; max-height: 80vh; }

        .group-label { font-size: 11px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin: 15px 0 10px 0; }
        .layer-item { display: flex; align-items: center; padding: 10px; background: #fff; border-radius: 10px; margin-bottom: 5px; border: 1px solid #f1f5f9; cursor: pointer; }
        .layer-item input { margin-right: 12px; width: 16px; height: 16px; accent-color: var(--primary); }

        /* 命名与弹窗 */
        #naming-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; z-index: 3000; display: none; background: white; padding: 30px; border-radius: 24px; box-shadow: var(--shadow); text-align: center; }
        #naming-ui input { width: 100%; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; margin-bottom: 15px; outline: none; }
        #naming-ui button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 700; }
    </style>
</head>
<body>

<div id="header-hud">
    <div id="header">
        <h1>大徐家汇数智化平台</h1>
        <p>● 分析模式 (只读已筛选数据)</p>
    </div>
</div>

<div id="analysis-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-layer-t" title="图层与筛选控制"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
</div>

<div id="editor-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-ruler" title="测距"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20L5 6M9 6l3 3M12 9l3 3M15 12l3 3"/></svg></div>
    <div class="tool-btn" id="btn-poly" title="绘制区域"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/></svg></div>
    <div class="tool-btn" id="btn-marker" title="标注点"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
    <div class="tool-btn danger" id="btn-eraser" title="橡皮擦"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17l-10-10"/></svg></div>
</div>

<div id="layer-menu" class="floating-window">
    <div class="win-header"><span>分析控制面板</span><span onclick="deactivateAll()" style="cursor:pointer; font-size:20px;">×</span></div>
    <div style="padding:20px; overflow-y:auto; flex:1;">
        <div class="group-label">活跃数据大类</div>
        <div id="active-category-list"></div>
        
        <div class="group-label">筛选项微调 (关键词)</div>
        <div id="active-keyword-list"></div>
    </div>
</div>

<div id="naming-ui">
    <h3 style="margin-top:0; font-size:16px;">标记点命名</h3>
    <input type="text" id="m-name" placeholder="输入名称...">
    <button id="m-save">确认保存</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<script>
    // 1. 初始化地图
    var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);
    map.pm.setLang('zh');

    // 2. 读取上一页保存的状态
    const state = JSON.parse(localStorage.getItem('analysis_state')) || { keywords: [], activeLayers: [] };
    const pool = {}, displayLayers = {};
    const keywordVisibility = {};
    state.keywords.forEach(kw => keywordVisibility[kw] = true); // 默认关键词全部开启

    // 3. 核心渲染函数：结合大类开关和关键词开关
    function refreshMap() {
        for(let name in displayLayers) {
            const conf = displayLayers[name].conf;
            map.removeLayer(displayLayers[name].layer);
            
            if(conf.visible) {
                displayLayers[name].layer = L.geoJSON(pool[name], {
                    filter: (f) => {
                        if(state.keywords.length === 0) return true;
                        // 逻辑：如果该点包含某个关键词，且该关键词在 UI 中被勾选，则显示
                        return state.keywords.some(kw => f.properties.name.includes(kw) && keywordVisibility[kw]);
                    },
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 5, weight: 1.5, fillColor: conf.c, color: "#fff", fillOpacity: 0.9 }),
                    onEachFeature: (f, l) => { l.bindPopup(`<b>${f.properties.name}</b><br>${f.properties.address || '-'}`); }
                }).addTo(map);
            }
        }
    }

    // 4. 加载数据并生成 UI
    state.activeLayers.forEach(name => {
        const color = name.includes('房产') ? '#FF7E5F' : `hsl(${(state.activeLayers.indexOf(name)*137)%360},65%,50%)`;
        const path = name.includes('房产') ? 'houses.json' : `data_poi/${name}.json`;
        
        fetch(path).then(r => r.json()).then(data => {
            pool[name] = data;
            displayLayers[name] = { layer: L.layerGroup(), conf: { c: color, visible: true } };
            
            // 生成大类开关
            const div = document.createElement('div'); div.className = 'layer-item';
            div.innerHTML = `<input type="checkbox" checked><div style="width:8px; height:8px; border-radius:50%; background:${color}; margin-right:12px;"></div><span>${name}</span>`;
            div.querySelector('input').onchange = (e) => { displayLayers[name].conf.visible = e.target.checked; refreshMap(); };
            document.getElementById('active-category-list').appendChild(div);
            
            refreshMap();
        });
    });

    // 生成关键词开关
    state.keywords.forEach(kw => {
        const div = document.createElement('div'); div.className = 'layer-item';
        div.innerHTML = `<input type="checkbox" checked><span>${kw}</span>`;
        div.querySelector('input').onchange = (e) => { keywordVisibility[kw] = e.target.checked; refreshMap(); };
        document.getElementById('active-keyword-list').appendChild(div);
    });

    // 5. 排他性与测绘工具 (含 ESC 逻辑)
    function deactivateAll() {
        document.querySelectorAll('.floating-window').forEach(w => w.style.display = 'none');
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('naming-ui').style.display = 'none';
        map.pm.disableDraw();
        map.pm.disableGlobalRemovalMode();
    }
    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') deactivateAll(); });

    const setupBtn = (id, action) => {
        document.getElementById(id).onclick = () => {
            const wasActive = document.getElementById(id).classList.contains('active');
            deactivateAll();
            if(!wasActive) { action(); document.getElementById(id).classList.add('active'); }
        };
    };

    setupBtn('btn-layer-t', () => document.getElementById('layer-menu').style.display = 'flex');
    setupBtn('btn-ruler', () => map.pm.enableDraw('Line', { measurements: { showLength: true } }));
    setupBtn('btn-poly', () => map.pm.enableDraw('Polygon', { measurements: { showArea: true } }));
    setupBtn('btn-marker', () => map.pm.enableDraw('Marker'));
    setupBtn('btn-eraser', () => map.pm.toggleGlobalRemovalMode());

    // 标注命名逻辑
    let curM = null;
    map.on('pm:create', (e) => { if(e.shape === 'Marker') { curM = e.layer; document.getElementById('naming-ui').style.display='block'; } });
    document.getElementById('m-save').onclick = () => { curM.bindPopup(`<b>${document.getElementById('m-name').value}</b>`).openPopup(); deactivateAll(); };

    fetch('xuhui.json').then(r => r.json()).then(data => L.geoJSON(data, { style: { color: "#2BB5BE", weight: 1.5, fillOpacity: 0.05 }}).addTo(map));
</script>
</body>
</html>
