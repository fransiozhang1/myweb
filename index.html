<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化空间分析平台</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #2BB5BE;
            --accent: #FF7E5F;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, "SF Pro SC", sans-serif; background: #f4f7f9; }
        
        /* --- 左上角标题 HUD --- */
        #header { position: absolute; top: 30px; left: 30px; z-index: 2000; pointer-events: none; }
        #header h1 { margin: 0; font-size: 26px; font-weight: 800; color: #1e293b; letter-spacing: -1px; }
        #header p { margin: 6px 0 0; font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        #map { width: 100vw; height: 100vh; z-index: 1; }

        /* --- 右侧功能工具栏 --- */
        #toolbar { position: absolute; top: 30px; right: 30px; z-index: 2000; display: flex; flex-direction: column; gap: 15px; }
        .tool-btn {
            width: 52px; height: 52px; background: white; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); cursor: pointer; border: 1px solid #fff; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #64748b;
        }
        .tool-btn:hover, .tool-btn.active { color: var(--primary); transform: scale(1.1); border-color: var(--primary); }
        .tool-btn svg { width: 22px; height: 22px; }

        /* --- 浮动筛选菜单 (带图例点) --- */
        #filter-menu {
            position: absolute; top: 30px; right: 100px; z-index: 1999;
            width: 300px; max-height: 80vh; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid #fff;
            box-shadow: var(--shadow); display: none; flex-direction: column; overflow: hidden;
        }
        .menu-header { padding: 20px 24px; border-bottom: 1px solid rgba(0,0,0,0.05); font-weight: 800; color: #334155; font-size: 15px; }
        .menu-body { flex: 1; overflow-y: auto; padding: 20px; }
        .group-label { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin: 15px 0 10px 5px; letter-spacing: 1px; }
        
        .layer-card {
            display: flex; align-items: center; padding: 10px 14px; margin-bottom: 6px;
            background: rgba(255,255,255,0.6); border-radius: 10px; cursor: pointer; transition: 0.2s;
            border: 1px solid transparent;
        }
        .layer-card:hover { background: #fff; border-color: #f1f5f9; transform: translateX(5px); }
        .layer-card input { margin-right: 12px; accent-color: var(--primary); width: 16px; height: 16px; }
        
        /* 颜色指示点 (图例) */
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; box-shadow: 0 0 4px rgba(0,0,0,0.1); }
        .layer-name { font-size: 13px; color: #475569; font-weight: 500; }

        /* --- 可拖拽对话框 (流式传输版) --- */
        #chat-window {
            position: absolute; bottom: 40px; right: 100px; z-index: 2002;
            width: 340px; height: 450px; background: white; border-radius: 20px;
            box-shadow: var(--shadow); display: none; flex-direction: column; overflow: hidden;
            border: 1px solid #f1f5f9;
        }
        #chat-header {
            padding: 15px 20px; background: var(--primary); color: white;
            cursor: move; display: flex; justify-content: space-between; align-items: center;
        }
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; line-height: 1.6; color: #334155; display: flex; flex-direction: column; gap: 12px; }
        #chat-input-area { padding: 15px; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; background: #fafbfc; }
        #chat-input-area input { flex: 1; border: 1px solid #e2e8f0; padding: 10px 14px; border-radius: 12px; outline: none; font-size: 13px; }
        #chat-input-area button { background: var(--primary); border: none; color: white; padding: 0 18px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        
        .msg { padding: 10px 14px; border-radius: 14px; max-width: 90%; word-wrap: break-word; }
        .msg.user { background: #f1f5f9; color: #1e293b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.ai { background: #e0f7fa; color: #006064; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* --- 弹窗美化 --- */
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .custom-popup .leaflet-popup-content { margin: 0 !important; width: 280px !important; }
        .popup-header { background: var(--primary); color: white; padding: 14px 18px; }
        .popup-header.house { background: var(--accent); }
        .popup-header h3 { margin: 0; font-size: 15px; font-weight: 700; }
        .popup-body { padding: 15px 18px; font-size: 12px; line-height: 1.5; }
        .p-row { display: flex; margin-bottom: 6px; border-bottom: 1px solid #f8fafc; padding-bottom: 4px; }
        .p-label { color: #94a3b8; width: 45px; font-weight: 600; flex-shrink: 0; }
        .p-val { color: #334155; flex: 1; padding-left: 8px; }
    </style>
</head>
<body>

<div id="header">
    <h1>大徐家汇数智化平台</h1>
    <p>Xuhui Smart Spatial Analysis Infrastructure</p>
</div>

<div id="toolbar">
    <div class="tool-btn" id="btn-filter" title="筛选图层"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></div>
    <div class="tool-btn" id="btn-export" title="导出截图"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
    <div class="tool-btn" id="btn-chat" title="AI 助手"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
</div>

<div id="filter-menu">
    <div class="menu-header">数据图层管理</div>
    <div class="menu-body">
        <div class="group-label">房产数据项目</div>
        <div id="house-list"></div>
        <div class="group-label">POI 设施分类</div>
        <div id="poi-list"></div>
    </div>
</div>

<div id="chat-window">
    <div id="chat-header">
        <span style="font-weight:800; font-size:14px; letter-spacing:0.5px;">AI 空间助手 (Qwen)</span>
        <span id="close-chat" style="cursor:pointer; font-size:18px;">×</span>
    </div>
    <div id="chat-content">
        <div class="msg ai">您好！我是大徐家汇数智助理。我可以帮您分析空间数据或规划建议。</div>
    </div>
    <div id="chat-input-area">
        <input type="text" id="user-input" placeholder="输入您的问题...">
        <button id="send-msg">发送</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/leaflet-simple-map-screenshoter"></script>

<script>
    // 1. 地图初始化 (锁定 WGS84 与 CartoDB 样式)
    var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 2. UI 交互逻辑
    const toggleUI = (btnId, panelId) => {
        const btn = document.getElementById(btnId);
        const panel = document.getElementById(panelId);
        btn.onclick = () => {
            const isVisible = panel.style.display === 'flex';
            panel.style.display = isVisible ? 'none' : 'flex';
            btn.classList.toggle('active', !isVisible);
        };
    };
    toggleUI('btn-filter', 'filter-menu');
    toggleUI('btn-chat', 'chat-window');
    document.getElementById('close-chat').onclick = () => {
        document.getElementById('chat-window').style.display = 'none';
        document.getElementById('btn-chat').classList.remove('active');
    };

    // 3. 拖拽逻辑保持
    const chatWin = document.getElementById("chat-window"), chatHead = document.getElementById("chat-header");
    let isDragging = false, offset = [0, 0];
    chatHead.onmousedown = (e) => { isDragging = true; offset = [chatWin.offsetLeft - e.clientX, chatWin.offsetTop - e.clientY]; };
    document.onmousemove = (e) => { if (!isDragging) return; chatWin.style.left = (e.clientX + offset[0]) + 'px'; chatWin.style.top = (e.clientY + offset[1]) + 'px'; chatWin.style.bottom = 'auto'; };
    document.onmouseup = () => isDragging = false;

    // 4. 流式传输 AI 对话 (Qwen API)
    const API_KEY = "sk-953b1a97918949d2a18c9a07a14729d0";
    async function chatWithAI() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        const chatBox = document.getElementById('chat-content');
        chatBox.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // 创建 AI 消息占位符
        const aiMsgDiv = document.createElement('div');
        aiMsgDiv.className = 'msg ai';
        aiMsgDiv.innerText = "...";
        chatBox.appendChild(aiMsgDiv);

        try {
            const response = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "qwen-plus",
                    messages: [{ role: "user", content: text }],
                    stream: true // 开启流式传输
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let aiText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                
                for (const line of lines) {
                    if (line.startsWith("data: ") && line !== "data: [DONE]") {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const content = data.choices[0].delta.content || "";
                            aiText += content;
                            aiMsgDiv.innerText = aiText; // 即时更新文字
                            chatBox.scrollTop = chatBox.scrollHeight;
                        } catch (e) {}
                    }
                }
            }
        } catch (e) {
            aiMsgDiv.innerText = "抱歉，连接助手失败。";
        }
    }
    document.getElementById('send-msg').onclick = chatWithAI;
    document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') chatWithAI(); };

    // 5. 数据加载与图例点同步
    const poiFiles = ["餐饮服务", "风景名胜", "公共设施", "公司企业", "购物服务", "交通设施服务", "金融保险服务", "科教文化服务", "摩托车服务", "汽车服务", "汽车维修", "汽车销售", "商务住宅", "生活服务", "室内设施", "体育休闲服务", "通行设施", "虚拟数据", "医疗保健服务", "政府机构及社会团体", "住宿服务"];
    const activeLayers = {};

    function toggleDataLayer(name, color, type, show) {
        if (show) {
            const path = type === 'house' ? 'houses.json' : `data_poi/${name}.json`;
            fetch(path).then(r => r.json()).then(data => {
                const layer = L.geoJSON(data, {
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 5, weight: 1.5, fillColor: color, color: "#fff", fillOpacity: 0.9 }),
                    onEachFeature: (f, l) => {
                        const p = f.properties;
                        let h = `<div class="popup-header ${type==='house'?'house':''}"><h3>${p.name || '项目'}</h3></div><div class="popup-body">`;
                        if (type === 'house') {
                            h += `<div class="p-row"><span class="p-label">地址</span><span class="p-val">${p.address || '-'}</span></div>
                                  <div class="p-row"><span class="p-label">类型</span><span class="p-val">${p.type || '-'}</span></div>`;
                        } else {
                            h += `<div class="p-row"><span class="p-label">id</span><span class="p-val">${p.id || '-'}</span></div>
                                  <div class="p-row"><span class="p-label">地址</span><span class="p-val">${p.address || '-'}</span></div>
                                  <div class="p-row"><span class="p-label">大类</span><span class="p-val">${p.大类 || '-'}</span></div>
                                  <div class="p-row"><span class="p-label">中类</span><span class="p-val">${p.中类 || '-'}</span></div>
                                  <div class="p-row"><span class="p-label">小类</span><span class="p-val">${p.小类 || '-'}</span></div>`;
                        }
                        h += `</div>`;
                        l.bindPopup(h, { className: 'custom-popup', maxWidth: 280 });
                    }
                }).addTo(map);
                activeLayers[name] = layer;
            });
        } else if (activeLayers[name]) { map.removeLayer(activeLayers[name]); delete activeLayers[name]; }
    }

    const createItem = (name, color, type, container) => {
        const div = document.createElement('div');
        div.className = 'layer-card';
        // 关键点：在 HTML 中注入与地图一致的颜色点 (Legend Dot)
        div.innerHTML = `<input type="checkbox"><div class="legend-dot" style="background:${color}"></div><span class="layer-name">${name}</span>`;
        div.querySelector('input').onchange = (e) => toggleDataLayer(name, color, type, e.target.checked);
        container.appendChild(div);
    };

    // 初始化 UI
    createItem('徐汇房产分布', '#FF7E5F', 'house', document.getElementById('house-list'));
    poiFiles.forEach((name, i) => createItem(name, `hsl(${(i * 137.5) % 360}, 65%, 50%)`, 'poi', document.getElementById('poi-list')));

    // 截图功能保持
    const screenshoter = L.simpleMapScreenshoter({ hidden: true }).addTo(map);
    document.getElementById('btn-export').onclick = () => screenshoter.takeScreen('blob').then(blob => {
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `分析导出_${Date.now()}.png`; a.click();
    });

    // 基础底图
    fetch('xuhui.json').then(r => r.json()).then(data => L.geoJSON(data, { style: { color: "#2BB5BE", fillColor: "#BFDBE4", fillOpacity: 0.05, weight: 1.5 }}).addTo(map));
</script>
</body>
</html>
