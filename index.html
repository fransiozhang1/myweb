<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 | 大徐家汇数智化平台</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.8);
            --error: #ef4444;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: -apple-system, "SF Pro SC", "PingFang SC", sans-serif;
            overflow: hidden;
        }

        /* --- 海浪背景动画 --- */
        .ocean {
            height: 100%;
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            background: #f8fafc;
            z-index: -1;
        }

        .wave {
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x;
            position: absolute;
            top: -198px;
            width: 6400px;
            height: 198px;
            animation: wave 15s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            transform: translate3d(0, 0, 0);
            opacity: 0.1; /* 灰白色调的关键：低透明度 */
        }

        .wave:nth-of-type(2) {
            top: -175px;
            animation: wave 12s cubic-bezier(0.36, 0.45, 0.63, 0.53) -.125s infinite, swell 10s ease -1.25s infinite;
            opacity: 0.05;
        }

        @keyframes wave {
            0% { margin-left: 0; }
            100% { margin-left: -1600px; }
        }

        @keyframes swell {
            0%, 100% { transform: translate3d(0, -25px, 0); }
            50% { transform: translate3d(0, 5px, 0); }
        }

        /* --- 验证卡片设计 --- */
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 60px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 420px;
            z-index: 10;
        }

        h1 {
            color: var(--text-main);
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 13px;
            letter-spacing: 3px;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .input-group {
            margin-top: 50px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #e2e8f0;
            padding: 16px 24px;
            border-radius: 16px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            letter-spacing: 4px;
        }

        input:focus {
            border-color: #cbd5e1;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.03);
        }

        .btn-enter {
            width: 100%;
            margin-top: 30px;
            background: var(--text-main);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .btn-enter:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #error-msg {
            color: var(--error);
            font-size: 12px;
            margin-top: 18px;
            height: 18px;
            opacity: 0;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .footer {
            margin-top: 50px;
            color: var(--text-sub);
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="ocean">
    <div class="wave"></div>
    <div class="wave"></div>
</div>

<div class="login-card">
    <h1>大徐家汇数智化平台</h1>
    <div class="subtitle">Spatial Management Console</div>

    <div class="input-group">
        <input type="password" id="key-input" placeholder="输入访问密钥" autocomplete="off">
    </div>

    <div id="error-msg">密钥无效，请核对后重新输入</div>

    <button class="btn-enter" onclick="verifyKey()">验证并进入系统</button>

    <div class="footer">© 2026 DIGITAL INTELLIGENCE RESEARCH</div>
</div>



<script>
    async function verifyKey() {
        const userInput = document.getElementById('key-input').value;
        const error = document.getElementById('error-msg');

        if (!userInput) {
            error.innerText = "请输入密钥";
            error.style.opacity = 1;
            return;
        }

        try {
            // 1. 读取同文件夹下的 key.txt
            const response = await fetch('key.txt');
            
            if (!response.ok) {
                throw new Error('无法读取密钥文件');
            }

            const text = await response.text();
            
            // 2. 将内容按逗号分割并清洗空格
            const validKeys = text.split(',').map(k => k.trim());

            // 3. 匹配验证
            if (validKeys.includes(userInput)) {
                error.style.opacity = 0;
                // 验证成功，跳转
                window.location.href = "main.html"; 
            } else {
                throw new Error('密钥错误');
            }

        } catch (err) {
            // 验证失败或文件读取失败的处理
            error.innerText = err.message === '密钥错误' ? "密钥验证失败，请重新输入" : "系统配置异常，请联系管理员";
            error.style.opacity = 1;
            document.getElementById('key-input').value = "";
            document.getElementById('key-input').focus();
            
            // 简单的抖动动画效果
            const card = document.querySelector('.login-card');
            card.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-10px)' },
                { transform: 'translateX(10px)' },
                { transform: 'translateX(0)' }
            ], { duration: 300 });
        }
    }

    // 支持回车键触发
    document.getElementById('key-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyKey();
    });
</script>

</body>
</html>
