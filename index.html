<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化平台-数据筛选</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <style>
        :root {
            --primary: #2BB5BE;
            --accent: #FF7E5F;
            --glass: rgba(255, 255, 255, 0.98);
            --shadow: 0 12px 45px rgba(0,0,0,0.15);
            --btn-size: 54px;   /* 增大 20% */
            --icon-size: 22px;  /* 增大 20% */
            --stroke-w: 2.0;    /* 线条粗细 2.0 */
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #f0f2f5; }
        #map { width: 100vw; height: 100vh; z-index: 1; }

        /* --- 左上角 HUD 与 分析入口 --- */
        #header-hud {
    position: absolute;
    top: 30px;
    left: 35px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

#header h1 {
    margin: 0;
    font-size: 25px;
    font-weight: 800;
    color: #1e293b;
    letter-spacing: -0.8px;
}

#header p {
    margin: 3px 0 0;
    font-size: 10px;
    color: #94a3b8;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.8px;
}
        #btn-analysis-entry { 
    background: var(--primary);
    color: white;
    border: none;
    padding: 11px 18px;
    border-radius: 14px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 10px 28px rgba(43,181,190,0.22);
    transition: 0.22s;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    width: fit-content;
}

#btn-analysis-entry:hover {
    transform: translateY(-2px);
    filter: brightness(1.04);
}

#btn-analysis-entry svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}

        /* --- 右侧功能工具栏 (分组) --- */
        .toolbar-group { position: absolute; right: 30px; z-index: 2000; display: flex; flex-direction: column; gap: 15px; }
        #analysis-tools { top: 30px; } 
        #editor-tools { top: 340px; }

        .tool-btn {
            width: var(--btn-size); height: var(--btn-size); background: white; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); cursor: pointer; border: 1px solid #fff; 
            transition: 0.2s; color: #64748b;
        }
        .tool-btn:hover, .tool-btn.active { color: var(--primary); transform: scale(1.08); border-color: var(--primary); }
        .tool-btn.danger:hover { color: #ff4757; border-color: #ff4757; }
        .tool-btn svg { width: var(--icon-size); height: var(--icon-size); stroke-width: var(--stroke-w); }

        /* --- 浮动窗口通用 --- */
        .floating-window {
            position: absolute; z-index: 2000; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid #fff;
            box-shadow: var(--shadow); display: none; flex-direction: column; overflow: hidden;
        }
        .win-header { padding: 18px 22px; background: #fff; border-bottom: 1px solid #f1f5f9; cursor: move; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 15px; }
        .close-win { cursor: pointer; font-size: 24px; color: #cbd5e1; }

        #layer-menu { top: 30px; right: 100px; width: 320px; max-height: 70vh; }
        #filter-manager { top: 110px; right: 100px; width: 340px; height: 420px; }
        #chat-window { bottom: 40px; right: 100px; width: 380px; height: 500px; }

        /* --- 确认 Modal & 命名 UI --- */
        #confirm-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        #naming-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; z-index: 3000; display: none; background: white; padding: 30px; border-radius: 24px; box-shadow: var(--shadow); text-align: center; }
        #naming-ui input { width: 100%; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; margin-bottom: 15px; outline: none; }
        #naming-ui button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 700; }

        /* --- 筛选器表格 --- */
        .filter-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .f-input-group { display: flex; gap: 10px; }
        .f-input-group input { flex: 1; border: 1px solid #e2e8f0; padding: 10px; border-radius: 10px; }
        .f-input-group button { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; }
        .f-table { flex: 1; overflow-y: auto; background: white; border-radius: 12px; border: 1px solid #f1f5f9; font-size: 13px; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }

        /* --- AI 助手流式 --- */
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; background: #fdfdfd; display: flex; flex-direction: column; gap: 12px; }
        #chat-input-area { padding: 18px 22px; background: white; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; }
        #chat-in { flex: 1; background: #f4f7f9; border: 1px solid #eef2f7; border-radius: 12px; padding: 10px 15px; outline: none; }
        .msg { padding: 10px 14px; border-radius: 14px; max-width: 85%; font-size: 13px; line-height: 1.5; }
        .msg.user { background: #f1f5f9; align-self: flex-end; }
        .msg.ai { background: #e0f7fa; align-self: flex-start; }
        /* --- 增量样式：图层分类与饼图 --- */
.group-label { 
    font-size: 11px; color: #94a3b8; font-weight: 800; text-transform: uppercase; 
    margin: 18px 0 8px 0; letter-spacing: 1px; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; 
}
.pie-container { width: 220px; height: 220px; margin: 10px auto; position: relative; }
.popup-info-row { 
    font-size: 13px; font-weight: 800; color: #1e293b; margin-bottom: 8px; 
    border-left: 4px solid var(--primary); padding-left: 10px; 
}
/* 饼图悬浮提示框 */
#pie-tip { 
    position:fixed; display:none; background:rgba(0,0,0,0.9); color:#fff; padding:8px 14px; 
    border-radius:10px; font-size:12px; pointer-events:none; z-index:9999; 
    backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); font-weight:600; 
}
.left-action-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 11px 18px;
    border-radius: 14px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 10px 28px rgba(43,181,190,0.22);
    transition: 0.22s;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    width: fit-content;
    pointer-events: auto;
}

.left-action-btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.04);
}

.left-action-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}
    </style>
</head>
<body>

<div id="header-hud">
    <div id="header">
        <h1>大徐家汇数智化平台</h1>
        <p>Spatial Management Console</p>
    </div>
    <button id="btn-analysis-entry" class="left-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        进入数据分析
    </button>
    <button id="btn-api-key-entry" class="left-action-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 2l-2 2"></path>
        <path d="M7.5 7.5a4 4 0 1 1 5.7 5.6l-1.2 1.2"></path>
        <path d="M14 6l4 4"></path>
        <path d="M3 21l6-1 10-10-5-5L4 15l-1 6z"></path>
    </svg>
    输入 API Key
</button>
</div>

<div id="confirm-modal">
    <div style="background:white; padding:40px; border-radius:28px; width:340px; text-align:center;">
        <h2>进入分析模式</h2>
        <p style="color:#64748b; font-size:14px;">进入后将锁定当前勾选分类与筛选词，分析期间不可修改数据。确认继续？</p>
        <div style="display:flex; gap:15px; margin-top:30px;">
            <button style="flex:1; padding:12px; border-radius:12px; background:#f1f5f9; border:none; cursor:pointer;" onclick="closeModal()">取消</button>
            <button style="flex:1; padding:12px; border-radius:12px; background:var(--primary); color:white; border:none; cursor:pointer;" onclick="goToAnalysis()">确认进入</button>
        </div>
    </div>
    
</div>


<div id="analysis-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-layer" title="图层控制"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div class="tool-btn" id="btn-filter" title="多项筛选"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg></div>
    <div class="tool-btn" id="btn-upload-table" title="上传表格点位"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"></path><path d="M8 8l4-4 4 4"></path><path d="M20 16.5v2a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5v-2"></path></svg></div>

</div>

<div id="editor-tools" class="toolbar-group">
    <div class="tool-btn" id="btn-ruler" title="测距 (尺子图标)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20L5 6M9 6l3 3M12 9l3 3M15 12l3 3"/></svg></div>
    <div class="tool-btn" id="btn-poly" title="绘面/面积"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/></svg></div>
    <div class="tool-btn" id="btn-marker" title="标注点"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
    <div class="tool-btn danger" id="btn-eraser" title="橡皮擦 (点击删除)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17l-10-10"/></svg></div>
</div>

<div id="layer-menu" class="floating-window">
    <div class="win-header"><span>图层管理中心</span><span class="close-win">×</span></div>
    <div style="padding:20px; overflow-y:auto; flex:1;">
        <div class="group-label">城市空间要素 (AOI)</div>
        <div id="aoi-list-ui"></div>
        <div class="group-label" style="margin-top: 20px;">城市地理路网</div>
        <div id="road-layers-container"></div>
        <div class="group-label">街景语义分析 (Street View)</div>
        
        <div id="street-view-list-ui"></div> <div class="group-label">城市 POI 兴趣点</div>
        <div id="poi-list-ui"></div> <div class="group-label">房产项目数据</div>
        <div id="house-list-ui"></div> </div>
</div>

<div id="filter-manager" class="floating-window">
    <div class="win-header"><span>高级筛选管理器</span><span class="close-win">×</span></div>
    <div class="filter-body">
        <div class="f-input-group"><input type="text" id="f-kw-in" placeholder="添加关键词..."><button id="btn-add-kw">添加</button></div>
        <div class="f-table"><table><tbody id="kw-list-body"></tbody></table></div>
    </div>
</div>

<div id="upload-table-win" class="floating-window" style="top: 190px; right: 100px; width: 380px;">
    <div class="win-header"><span>上传表格生成点图层</span><span class="close-win">×</span></div>
    <div style="padding:20px; display:flex; flex-direction:column; gap:14px;">
        <div>
            <div class="group-label" style="margin-top:0;">1. 上传文件</div>
            <input id="table-file-input" type="file" accept=".csv,.xlsx,.xls" style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:12px; box-sizing:border-box;">
        </div>

        <div>
            <div class="group-label" style="margin-top:0;">2. 图层名称</div>
            <input id="table-layer-name" type="text" placeholder="例如：自定义POI数据" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:12px; box-sizing:border-box;">
        </div>

        <div>
            <div class="group-label" style="margin-top:0;">3. 经度字段</div>
            <select id="table-lng-field" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:12px; box-sizing:border-box;"></select>
        </div>

        <div>
            <div class="group-label" style="margin-top:0;">4. 纬度字段</div>
            <select id="table-lat-field" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:12px; box-sizing:border-box;"></select>
        </div>

        <button id="btn-build-table-layer" style="background:var(--primary); color:white; border:none; padding:13px 16px; border-radius:14px; font-weight:800; cursor:pointer; font-size:14px;">
            生成点图层
        </button>
    </div>
</div>

<div id="naming-ui">
    <h3 style="margin-top:0;">标注点命名</h3>
    <input type="text" id="marker-name-in" placeholder="输入名称...">
    <button id="btn-save-marker">保存标注</button>
</div>
<div id="api-key-win" class="floating-window" style="display:none; top: 180px; left: 35px; width: 380px;">
    <div class="win-header">
        <span>输入 API Key</span>
        <span class="close-win" onclick="closeApiKeyModal()">×</span>
    </div>
    <div style="padding:20px; display:flex; flex-direction:column; gap:14px;">
        <div id="api-key-status" style="font-size:12px; color:#64748b;">
            当前状态：未设置
        </div>

        <input
            id="api-key-input"
            type="password"
            placeholder="请输入 API Key"
            style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:12px; box-sizing:border-box;"
        >

        <div style="display:flex; gap:10px;">
            <button id="btn-save-api-key" style="flex:1; background:var(--primary); color:white; border:none; padding:12px; border-radius:12px; font-weight:800; cursor:pointer;">
                保存
            </button>
            <button id="btn-clear-api-key" style="flex:1; background:#f8fafc; color:#334155; border:1px solid #e2e8f0; padding:12px; border-radius:12px; font-weight:800; cursor:pointer;">
                清除
            </button>
        </div>

        <button id="btn-save-api-key-and-continue" style="display:none;"></button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>

    // AOI 数据的详细配置
const aoiConfig = {
    "buildings_a": { n: "既有建筑底廓", c: "#94a3b8", fields: ["name", "type"] },
    "water_a":     { n: "水系/河湖区域", c: "#74ccf4", fields: ["name", "fclass"] },
    "landuse_a":   { n: "土地利用现状", c: "#fcd34d", fields: ["name", "fclass"] },
    "transport_a": { n: "交通设施范围", c: "#818cf8", fields: ["name", "fclass"] },
    "traffic_a":   { n: "道路/交通广场", c: "#475569", fields: ["name", "fclass"] },
    "pois_a":      { n: "公共兴趣面", c: "#f472b6", fields: ["name", "fclass"] },
    "pofw_a":      { n: "宗教场所区域", c: "#c084fc", fields: ["name", "fclass"] }
};
    // 1. 初始化地图
    var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 街景颜色配置
const svColors = { "road": "#808080", "sidewalk": "#FF00FF", "vegetation": "#228B22", "sky": "#87CEEB", "building": "#A52A2A", "car": "#0000FF", "person": "#FF0000" };

const API_KEY_STORAGE_KEY = 'user_api_key';

function getApiKey() {
    return localStorage.getItem(API_KEY_STORAGE_KEY) || '';
}

function saveApiKey(key) {
    localStorage.setItem(API_KEY_STORAGE_KEY, key.trim());
}

function clearApiKey() {
    localStorage.removeItem(API_KEY_STORAGE_KEY);
}

function hasApiKey() {
    return !!getApiKey();
}

function maskApiKey(key) {
    if (!key) return '未设置';
    if (key.length <= 8) return '已设置';
    return key.slice(0, 4) + '****' + key.slice(-4);
}

function updateApiKeyStatus() {
    const el = document.getElementById('api-key-status');
    if (!el) return;
    el.textContent = `当前状态：${maskApiKey(getApiKey())}`;
}

function openApiKeyModal() {
    const modal = document.getElementById('api-key-win');
    const input = document.getElementById('api-key-input');
    if (!modal || !input) return;

    input.value = getApiKey();
    modal.style.display = 'flex';
    updateApiKeyStatus();
}

function closeApiKeyModal() {
    const modal = document.getElementById('api-key-win');
    if (modal) modal.style.display = 'none';
}

function ensureApiKeyThen(callback) {
    const key = getApiKey();
    if (key) {
        callback(key);
        return;
    }

    openApiKeyModal();

    const confirmBtn = document.getElementById('btn-save-api-key-and-continue');
    if (confirmBtn) {
        confirmBtn.onclick = () => {
            const input = document.getElementById('api-key-input');
            const value = (input?.value || '').trim();

            if (!value) {
                alert('请输入 API Key');
                return;
            }

            saveApiKey(value);
            closeApiKeyModal();
            updateApiKeyStatus();
            callback(value);
        };
    }
}


// 饼图生成引擎
function generatePieChart(props) {
    const data = Object.entries(props).filter(([k, v]) => typeof v === 'number' && v > 0.01 && !['lon', 'lat'].includes(k)).sort((a, b) => b[1] - a[1]).slice(0, 10);
    if(!data.length) return '<p style="color:#94a3b8;font-size:11px;">无显著数据</p>';
    const total = data.reduce((s, [_, v]) => s + v, 0);
    let curA = 0; const r = 80, cx = 110, cy = 110; let paths = "";
    data.forEach(([label, value], i) => {
        const angle = (value / total) * 2 * Math.PI;
        const x1 = cx + r * Math.cos(curA), y1 = cy + r * Math.sin(curA);
        const x2 = cx + r * Math.cos(curA + angle), y2 = cy + r * Math.sin(curA + angle);
        const color = svColors[label] || `hsl(${(i * 53) % 360}, 60%, 65%)`;
        paths += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${angle>Math.PI?1:0} 1 ${x2} ${y2} Z" fill="${color}" stroke="#fff" onmouseover="showTip(event,'${label}','${(value*100).toFixed(1)}%')" onmouseout="hideTip()"></path>`;
        curA += angle;
    });
    return `<div class="pie-container"><svg width="220" height="220">${paths}</svg></div>`;
}

window.showTip = (e, l, p) => { const t = document.getElementById('pie-tip'); t.style.display = 'block'; t.innerText = `${l}: ${p}`; t.style.left = (e.clientX + 15) + 'px'; t.style.top = (e.clientY + 15) + 'px'; };
window.hideTip = () => { document.getElementById('pie-tip').style.display = 'none'; };

    // 2. 测绘插件与排他逻辑
    map.pm.setLang('zh');
    map.pm.addControls({ drawControls: false, editControls: false });

    function deactivateAll() {
        document.querySelectorAll('.floating-window').forEach(w => w.style.display = 'none');
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('naming-ui').style.display = 'none';
        map.pm.disableDraw();
        map.pm.disableGlobalRemovalMode();
    }

    // ESC 键监听
    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') deactivateAll(); });

    const setupBtn = (id, action) => {
    const btn = document.getElementById(id);
    if (!btn) return;   // 没有这个按钮就直接跳过，避免报错

    btn.onclick = () => {
        const wasActive = btn.classList.contains('active');
        deactivateAll();
        if (!wasActive) {
            action();
            btn.classList.add('active');
        }
    };
};

    setupBtn('btn-layer', () => document.getElementById('layer-menu').style.display = 'flex');
    setupBtn('btn-filter', () => document.getElementById('filter-manager').style.display = 'flex');
    setupBtn('btn-upload-table', () => document.getElementById('upload-table-win').style.display = 'flex');

const APP_DB_STORE = 'kv_store';

function openAppDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(APP_DB_NAME, 1);

        req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(APP_DB_STORE)) {
                db.createObjectStore(APP_DB_STORE);
            }
        };

        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function idbSet(key, value) {
    const db = await openAppDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(APP_DB_STORE, 'readwrite');
        const store = tx.objectStore(APP_DB_STORE);
        const req = store.put(value, key);

        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
    });
}

async function idbGet(key) {
    const db = await openAppDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(APP_DB_STORE, 'readonly');
        const store = tx.objectStore(APP_DB_STORE);
        const req = store.get(key);

        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

function guessCoordField(headers, type) {

        : ['lat', 'latitude', '纬度', 'y', 'wd'];

}

function parseCSVFile(file) {
    return new Promise((resolve, reject) => {
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: (res) => resolve(res.data || []),
            error: reject
        });
    });
}

function parseExcelFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const firstSheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
                resolve(rows);
            } catch (err) {
                reject(err);
            }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

async function parseTableFile(file) {
    const name = file.name.toLowerCase();
    if (name.endsWith('.csv')) {
        return await parseCSVFile(file);
    }
    if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
        return await parseExcelFile(file);
    }
    throw new Error('仅支持 CSV / XLSX / XLS 文件');
}

function buildPointFeatureCollectionFromTable(rows, lngField, latField) {
    const features = [];

    rows.forEach((row, idx) => {
        const lng = Number(row[lngField]);
        const lat = Number(row[latField]);

        if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;

        const props = { ...row };

        Object.keys(props).forEach(k => {
            const v = props[k];
            if (typeof v === 'string') {
                const n = Number(v);
                if (v.trim() !== '' && Number.isFinite(n)) props[k] = n;
            }
        });

        if (!props.name) {
            props.name = props.名称 || props.NAME || props.Name || `表格点 ${idx + 1}`;
        }

        features.push({
            type: 'Feature',
            geometry: {
                type: 'Point',
                coordinates: [lng, lat]
            },
            properties: props
        });
    });

    return {
        type: 'FeatureCollection',
        features
    };
}

                <input type="checkbox" style="flex-shrink:0; cursor:pointer; width:16px; height:16px; margin:0;">
                <div style="background:${cfg.color}; width:20px; height:3px; border-radius:1px; flex-shrink:0;"></div>
                <span style="font-size:13px; font-weight:600; color:#444; white-space:nowrap; flex-grow:1; display:block;">${type}</span>
            `;
            
            // 点击整个条目也能勾选（增强体验）
            item.onclick = (e) => {
                if (e.target.tagName === 'INPUT') return;
                const cb = item.querySelector('input');
                cb.checked = !cb.checked;
                cb.dispatchEvent(new Event('change'));
            };

const checkbox = item.querySelector('input');
checkbox.onchange = (e) => {
    if (e.target.checked) {
        // --- 核心修复：变量名由 config 改为 cfg，类型设为 'road' ---
        activeLayers[type] = { 
            layer: L.layerGroup().addTo(map), // 先创建一个空组
            conf: { c: cfg.color, t: 'road' } 
        };
        updateLayers(); // 触发统一渲染
    } else {
        if(activeLayers[type]) map.removeLayer(activeLayers[type].layer);
        delete activeLayers[type];
    }
};

            container.appendChild(item);
        });
        
        console.log("✅ 10 类彩色路网控制面板初始化成功");
    } catch (e) {
        console.error("❌ 路网初始化异常:", e);
    }
}

initRoadNetwork();
</script>
<div id="pie-tip"></div>
</body>
