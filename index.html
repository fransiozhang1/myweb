<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化空间分析平台 - V4.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #2BB5BE;
            --accent: #FF7E5F;
            --sidebar-bg: #ffffff;
            --sidebar-w: 320px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; overflow: hidden; font-family: -apple-system, sans-serif; background: #f4f7f9; }
        #app-container { display: flex; width: 100%; height: 100%; position: relative; }

        /* --- 侧边栏分组设计 --- */
        #sidebar {
            width: var(--sidebar-w); height: 100%; background: var(--sidebar-bg);
            border-right: 1px solid #e2e8f0; display: flex; flex-direction: column;
            z-index: 2000; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-w)); }

        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid #f1f5f9; }
        .sidebar-header h1 { margin: 0; font-size: 18px; font-weight: 700; color: #1e293b; }
        
        /* 滚动区域与分组标题 */
        #filter-container { flex: 1; overflow-y: auto; padding: 15px; background: #fff; }
        .group-title { 
            font-size: 11px; font-weight: 800; color: #94a3b8; 
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 20px 0 10px 5px; display: flex; align-items: center;
        }
        .group-title::after { content: ""; flex: 1; height: 1px; background: #f1f5f9; margin-left: 10px; }

        .layer-card {
            display: flex; align-items: center; padding: 10px 14px; margin-bottom: 6px;
            background: #fff; border: 1px solid #f1f5f9; border-radius: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .layer-card:hover { border-color: var(--primary); transform: translateX(4px); }
        .layer-card input { margin-right: 12px; accent-color: var(--primary); }
        .color-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }
        .layer-name { font-size: 13px; color: #475569; font-weight: 500; }

        /* --- 地图与工具 --- */
        #map { flex: 1; height: 100%; }
        #toggle-btn {
            position: absolute; left: var(--sidebar-w); top: 30px; z-index: 2001;
            background: white; border: 1px solid #e2e8f0; width: 28px; height: 48px;
            border-radius: 0 8px 8px 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.5s; box-shadow: 4px 0 10px rgba(0,0,0,0.03);
        }
        #sidebar.collapsed + #toggle-btn { left: 0; }
        #sidebar.collapsed + #toggle-btn svg { transform: rotate(180deg); }

        #toolbar { position: absolute; right: 24px; top: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .tool-btn { width: 44px; height: 44px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); cursor: pointer; border: 1px solid #fff; transition: 0.3s; color: #64748b; }
        .tool-btn:hover { color: var(--primary); transform: translateY(-2px); }

        /* --- 弹窗美化 --- */
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .custom-popup .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
        .popup-header { background: var(--primary); color: white; padding: 14px 18px; }
        .popup-header.house { background: var(--accent); } /* 房产用珊瑚色区分 */
        .popup-header h3 { margin: 0; font-size: 15px; font-weight: 700; }
        .popup-body { padding: 12px 18px 18px; font-size: 12px; }
        .popup-row { display: flex; padding: 6px 0; border-bottom: 1px solid #f8fafc; }
        .popup-label { color: #94a3b8; width: 40px; font-weight: 600; }
        .popup-value { color: #334155; flex: 1; padding-left: 8px; }

        #status-info { position: absolute; bottom: 20px; right: 80px; z-index: 1000; background: rgba(15, 23, 42, 0.8); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 11px; }
    </style>
</head>
<body>

<div id="app-container">
    <aside id="sidebar">
        <div class="sidebar-header">
            <h1>大徐家汇分析平台</h1>
            <p>Xuhui Multi-Source Data Platform</p>
        </div>
        <div id="filter-container">
            <div class="group-title">房产数据</div>
            <div id="house-list"></div>
            
            <div class="group-title">POI 数据</div>
            <div id="poi-list"></div>
        </div>
    </aside>

    <div id="toggle-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>

    <div id="toolbar">
        <div class="tool-btn" id="btn-export" title="导出截图"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
    </div>

    <main id="map"></main>
    <div id="status-info">● 平台初始化就绪</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/leaflet-simple-map-screenshoter"></script>

<script>
    const log = (msg) => { document.getElementById('status-info').innerText = `● ${msg}`; };

    // 1. 地图初始化 (锁定样式与坐标：WGS84)
    var map = L.map('map', { zoomControl: false, renderer: L.canvas() }).setView([31.15, 121.43], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 截图功能
    const screenshoter = L.simpleMapScreenshoter({ hidden: true }).addTo(map);
    document.getElementById('btn-export').onclick = () => { screenshoter.takeScreen('blob').then(blob => {
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `分析导出.png`; a.click();
    });};

    // 侧边栏折叠
    document.getElementById('toggle-btn').onclick = () => {
        document.getElementById('sidebar').classList.toggle('collapsed');
        setTimeout(() => { map.invalidateSize(); }, 500);
    };

    const poiFiles = ["餐饮服务", "风景名胜", "公共设施", "公司企业", "购物服务", "交通设施服务", "金融保险服务", "科教文化服务", "摩托车服务", "汽车服务", "汽车维修", "汽车销售", "商务住宅", "生活服务", "室内设施", "体育休闲服务", "通行设施", "虚拟数据", "医疗保健服务", "政府机构及社会团体", "住宿服务"];
    const activeLayers = {};

    function getPOIStyle(zoom) {
        if (zoom <= 12) return { r: 2, w: 0.5 };
        if (zoom <= 14) return { r: 4, w: 1.5 };
        return { r: 7, w: 2.5 };
    }

    // --- 通用加载逻辑 ---
    function toggleDataLayer(name, color, type, show) {
        if (show) {
            log(`正在载入: ${name}`);
            const path = type === 'house' ? 'houses.json' : `data_poi/${name}.json`;
            fetch(path).then(r => r.json()).then(data => {
                const layer = L.geoJSON(data, {
                    pointToLayer: (f, latlng) => {
                        const s = getPOIStyle(map.getZoom());
                        return L.circleMarker(latlng, { radius: s.r, weight: s.w, fillColor: color, color: "#fff", fillOpacity: 0.9 });
                    },
                    onEachFeature: (f, l) => {
                        const p = f.properties;
                        let html = '';
                        if (type === 'house') {
                            // 房产定制弹窗
                            html = `<div class="popup-header house"><h3>${p.name || '房产项目'}</h3></div>
                                    <div class="popup-body">
                                        <div class="popup-row"><span class="popup-label">地址</span><span class="popup-value">${p.address || '-'}</span></div>
                                        <div class="popup-row"><span class="popup-label">类型</span><span class="popup-value">${p.type || '-'}</span></div>
                                    </div>`;
                        } else {
                            // POI 定制弹窗
                            html = `<div class="popup-header"><h3>${p.name || 'POI'}</h3></div>
                                    <div class="popup-body">
                                        <div class="popup-row"><span class="popup-label">id</span><span class="popup-value">${p.id || '-'}</span></div>
                                        <div class="popup-row"><span class="popup-label">地址</span><span class="popup-value">${p.address || '-'}</span></div>
                                        <div class="popup-row"><span class="popup-label">大类</span><span class="popup-value">${p.大类 || '-'}</span></div>
                                        <div class="popup-row"><span class="popup-label">中类</span><span class="popup-value">${p.中类 || '-'}</span></div>
                                        <div class="popup-row"><span class="popup-label">小类</span><span class="popup-value">${p.小类 || '-'}</span></div>
                                    </div>`;
                        }
                        l.bindPopup(html, { className: 'custom-popup', maxWidth: 280 });
                    }
                }).addTo(map);
                activeLayers[name] = layer;
                log(`${name} 渲染完成`);
            }).catch(e => log(`加载失败: ${name}`));
        } else if (activeLayers[name]) {
            map.removeLayer(activeLayers[name]);
            delete activeLayers[name];
        }
    }

    // 生成 UI (房产数据)
    const houseContainer = document.getElementById('house-list');
    const houseCard = document.createElement('div');
    houseCard.className = 'layer-card';
    houseCard.innerHTML = `<input type="checkbox"><div class="color-dot" style="background:var(--accent)"></div><span class="layer-name">徐汇区房产分布</span>`;
    houseCard.onclick = (e) => { if (e.target.tagName !== 'INPUT') { const chk = houseCard.querySelector('input'); chk.checked = !chk.checked; chk.dispatchEvent(new Event('change')); }};
    houseCard.querySelector('input').onchange = (e) => toggleDataLayer('徐汇区房产分布', '#FF7E5F', 'house', e.target.checked);
    houseContainer.appendChild(houseCard);

    // 生成 UI (POI 数据)
    const poiContainer = document.getElementById('poi-list');
    poiFiles.forEach((name, index) => {
        const color = `hsl(${(index * 137.5) % 360}, 65%, 50%)`;
        const div = document.createElement('div');
        div.className = 'layer-card';
        div.innerHTML = `<input type="checkbox"><div class="color-dot" style="background:${color}"></div><span class="layer-name">${name}</span>`;
        div.onclick = (e) => { if (e.target.tagName !== 'INPUT') { const chk = div.querySelector('input'); chk.checked = !chk.checked; chk.dispatchEvent(new Event('change')); }};
        div.querySelector('input').onchange = (e) => toggleDataLayer(name, color, 'poi', e.target.checked);
        poiContainer.appendChild(div);
    });

    // 缩放同步
    map.on('zoomend', () => {
        const s = getPOIStyle(map.getZoom());
        for (let key in activeLayers) { activeLayers[key].eachLayer(l => l.setStyle({ radius: s.r, weight: s.w })); }
    });

    // 初始底图
    fetch('xuhui.json').then(r => r.json()).then(data => L.geoJSON(data, { style: { color: "#2BB5BE", fillColor: "#BFDBE4", fillOpacity: 0.05, weight: 1.5 }}).addTo(map));
</script>
</body>
</html>
