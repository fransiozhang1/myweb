<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>徐汇空间系统 (调试版)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { width: 100%; height: 100vh; }
        #debug-info { 
            position: absolute; bottom: 20px; left: 20px; z-index: 1000; 
            background: rgba(0,0,0,0.7); color: #0f0; padding: 10px; 
            font-family: monospace; font-size: 12px; max-width: 300px;
        }
    </style>
</head>
<body>

<div id="debug-info">📡 正在初始化调试日志...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const debug = (msg) => {
        console.log(msg);
        document.getElementById('debug-info').innerHTML += "<br>> " + msg;
    };

    var map = L.map('map').setView([31.15, 121.43], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    // 自动缩放的边界器
    var bounds = L.latLngBounds();

    function loadLayer(file, style, name) {
        debug(`正在尝试请求 ${file}...`);
        
        fetch(file)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP 错误! 状态码: ${response.status}`);
                return response.json();
            })
            .then(data => {
                if (!data.features || data.features.length === 0) {
                    debug(`⚠️ ${name} 加载成功但数据内容为空！`);
                    return;
                }
                
                var layer = L.geoJSON(data, { style: style }).addTo(map);
                bounds.extend(layer.getBounds());
                map.fitBounds(bounds); // 自动对齐视图
                
                debug(`✅ ${name} 加载成功: ${data.features.length} 个要素`);
            })
            .catch(err => {
                debug(`❌ ${name} 失败: ${err.message}`);
                if(location.protocol === 'file:') {
                    debug("💡 检测到是以 file:// 协议打开，请使用本地服务器运行。");
                }
            });
    }

    // 执行加载
    loadLayer('xuhui.json', { color: "#2BB5BE", fillColor: "#BFDBE4", fillOpacity: 0.3 }, "徐汇范围");
    loadLayer('roads.json', { color: "#FF4500", weight: 2 }, "快速路网");

</script>
</body>
</html>
