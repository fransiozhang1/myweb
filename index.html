<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大徐家汇数智化空间分析平台 - 修复版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; overflow: hidden; }
        #sidebar {
            width: 300px; height: 100vh; background: #ffffff;
            border-right: 1px solid #ddd; display: flex; flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1001;
        }
        .sidebar-header { padding: 20px; background: #2BB5BE; color: white; }
        #filter-container { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; }
        .filter-item {
            display: flex; align-items: center; padding: 8px 12px;
            margin-bottom: 5px; background: white; border-radius: 4px;
            border: 1px solid #eee; cursor: pointer;
        }
        .filter-item:hover { background: #f0fbfc; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
        
        /* 确保地图容器有明确的物理尺寸 */
        #map { flex: 1; height: 100vh; width: 100%; background: #e5e3df; }
        
        #debug-log {
            position: absolute; bottom: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #00ff00; 
            padding: 10px; font-size: 12px; border-radius: 4px; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header"><h2>图层控制</h2></div>
    <div id="filter-container"></div>
</div>

<div id="map"></div>
<div id="debug-log">正在初始化地图核心...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const log = (msg) => { document.getElementById('debug-log').innerHTML += `<br>> ${msg}`; };

    // 1. 初始化地图
    // 增加了一个 fallback 的底图，如果第一个打不开会显示背景色
    var map = L.map('map', {
        preferCanvas: true // 开启 Canvas 渲染，处理大量 POI 更流畅
    }).setView([31.15, 121.43], 13);

    // 更换为高德底图（在国内访问更稳定）
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: ["1", "2", "3", "4"],
        attribution: '© AutoNavi'
    }).addTo(map);

    const poiFiles = [
        "餐饮服务", "风景名胜", "公共设施", "公司企业", "购物服务",
        "交通设施服务", "金融保险服务", "科教文化服务", "摩托车服务", "汽车服务",
        "汽车维修", "汽车销售", "商务住宅", "生活服务", "室内设施",
        "体育休闲服务", "通行设施", "虚拟数据", "医疗保健服务", "政府机构及社会团体", "住宿服务"
    ];

    const activeLayers = {};
    const bounds = L.latLngBounds(); // 用于自动缩放

    // 2. 加载基础数据并自动对齐视图
    function loadBaseData(file, style, name) {
        fetch(file).then(r => r.json()).then(data => {
            const layer = L.geoJSON(data, { style: style }).addTo(map);
            // 关键：检查坐标是否在正常范围
            const firstCoord = data.features[0].geometry.coordinates[0];
            log(`${name} 首个坐标: ${JSON.stringify(firstCoord)}`);
            
            if (Math.abs(firstCoord[0]) > 180) {
                log(`❌ 警告: ${name} 使用了投影坐标(EPSG:4547)，请重新运行 Python 转换为 EPSG:4326!`);
            }
            
            map.fitBounds(layer.getBounds()); // 自动缩放到数据区域
            log(`✅ ${name} 已对齐视图`);
        }).catch(e => log(`❌ ${name} 加载失败: ${e.message}`));
    }

    loadBaseData('xuhui.json', {color: "#2BB5BE", fillColor: "#BFDBE4", fillOpacity: 0.2, weight: 2}, "徐汇边界");
    loadBaseData('roads.json', {color: "#C4C4C4", weight: 1.5, opacity: 0.6}, "快速路网");

    // 3. 动态创建侧边栏
    const container = document.getElementById('filter-container');
    poiFiles.forEach((name, index) => {
        const color = `hsl(${(index * 137.5) % 360}, 70%, 50%)`;
        const item = document.createElement('div');
        item.className = 'filter-item';
        item.innerHTML = `
            <input type="checkbox" id="chk-${index}">
            <div class="color-dot" style="background:${color}"></div>
            <label for="chk-${index}">${name}</label>
        `;
        container.appendChild(item);

        document.getElementById(`chk-${index}`).onchange = function(e) {
            if (e.target.checked) {
                log(`请求: ${name}.json`);
                fetch(`data_poi/${name}.json`).then(r => r.json()).then(data => {
                    const layer = L.geoJSON(data, {
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                            radius: 5, fillColor: color, color: "#fff", weight: 1, fillOpacity: 0.8
                        })
                    }).addTo(map);
                    activeLayers[name] = layer;
                    log(`成功显示: ${name}`);
                }).catch(err => log(`无法加载: ${name}`));
            } else {
                if (activeLayers[name]) {
                    map.removeLayer(activeLayers[name]);
                    delete activeLayers[name];
                }
            }
        };
    });

    // 强制地图刷新尺寸
    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
